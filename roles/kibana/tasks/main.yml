---

- name: Include global role
  ansible.builtin.import_role:
    name: oddly.elasticstack.elasticstack
  when: not hostvars[inventory_hostname]._elasticstack_role_imported | default(false)

- name: Main | Propagate stack-level security setting
  ansible.builtin.set_fact:
    kibana_security: "{{ elasticstack_security | bool }}"
  when:
    - elasticstack_full_stack | bool
    - not elasticstack_security | bool

- name: Set common password for common certificates
  ansible.builtin.set_fact:
    kibana_tls_key_passphrase: "{{ elasticstack_cert_pass }}"
  when:
    - elasticstack_cert_pass is defined

- name: Set Elasticsearch hosts if used with other roles
  ansible.builtin.set_fact:
    kibana_elasticsearch_hosts: "{{ groups[elasticstack_elasticsearch_group_name] }}"
  when:
    - kibana_elasticsearch_hosts is undefined
    - groups[elasticstack_elasticsearch_group_name] is defined

- name: Set Elasticsearch hosts to localhost if no other info is available
  ansible.builtin.set_fact:
    kibana_elasticsearch_hosts:
      - localhost
  when:
    - kibana_elasticsearch_hosts is undefined
    - groups[elasticstack_elasticsearch_group_name] is undefined

- name: Construct exact name of Kibana package
  ansible.builtin.set_fact:
    kibana_package: >-
      {{
      'kibana' +
      ((elasticstack_versionseparator +
      elasticstack_version |
      string) if (elasticstack_version is defined and elasticstack_version | length > 0 and elasticstack_version != 'latest') else '') |
      replace(' ', '') }}

- name: Install Kibana - rpm - full stack
  ansible.builtin.package:
    name: "{{ kibana_package }}"
    state: "{{ 'latest' if (elasticstack_version | default('') == 'latest') else 'present' }}"
    enablerepo:
      - 'elastic-{{ elasticstack_release }}.x'
  register: _kibana_install_rpm_full
  until: _kibana_install_rpm_full is success
  retries: 3
  delay: 10
  notify:
    - Restart Kibana
  when:
    - ansible_facts.os_family == "RedHat"
    - elasticstack_full_stack | bool

- name: Install Kibana - rpm - standalone
  ansible.builtin.package:
    name: "{{ kibana_package }}"
    state: "{{ 'latest' if (elasticstack_version | default('') == 'latest') else 'present' }}"
  register: _kibana_install_rpm
  until: _kibana_install_rpm is success
  retries: 3
  delay: 10
  notify:
    - Restart Kibana
  when:
    - ansible_facts.os_family == "RedHat"
    - not elasticstack_full_stack | bool

- name: Install Kibana - deb
  ansible.builtin.package:
    name: "{{ kibana_package }}"
    state: "{{ 'latest' if (elasticstack_version | default('') == 'latest') else 'present' }}"
  register: _kibana_install_deb
  until: _kibana_install_deb is success
  retries: 3
  delay: 10
  notify:
    - Restart Kibana
  when:
    - ansible_facts.os_family == "Debian"

- name: Import security related tasks
  ansible.builtin.import_tasks: kibana-security.yml
  when:
    - (elasticstack_full_stack | default(false) | bool and kibana_security | bool) or
      kibana_cert_source | default('elasticsearch_ca') == 'external'
  tags:
    - certificates
    - renew_ca
    - renew_kibana_cert

- name: Configure Kibana
  ansible.builtin.template:
    src: kibana.yml.j2
    dest: /etc/kibana/kibana.yml
    owner: root
    group: root
    mode: "0644"
    backup: "{{ kibana_config_backup }}"
  notify:
    - Restart Kibana
  when: kibana_manage_yaml | bool

- name: Set Kibana Node.js max-old-space-size
  ansible.builtin.lineinfile:
    path: /etc/kibana/node.options
    regexp: '^#?--max-old-space-size='
    line: "--max-old-space-size={{ kibana_node_max_old_space_size }}"
  notify:
    - Restart Kibana
  when: kibana_node_max_old_space_size | default('') | string | length > 0

- name: Import Kibana keystore tasks
  ansible.builtin.import_tasks: kibana-keystore.yml
  when:
    - (elasticstack_full_stack | default(false) | bool and kibana_security | bool) or
      kibana_tls | bool

- name: Start Kibana
  ansible.builtin.service:
    name: kibana
    state: started
    enabled: true
  when:
    - kibana_enable | bool
    - not ansible_check_mode
  register: _kibana_freshstart

# Flush any pending restart handler (e.g. from cert renewal or config changes)
# BEFORE waiting for Kibana to be ready. Without this, the wait task deadlocks:
# Kibana has stale TLS state in memory, the handler would fix it, but handlers
# only fire at play end — which never comes because the wait task blocks.
- name: Flush handlers before readiness check
  ansible.builtin.meta: flush_handlers

- name: Wait for Kibana to be ready
  when: not ansible_check_mode
  block:
    - name: Wait for Kibana HTTP with service health check
      ansible.builtin.shell:
        cmd: |
          if ! systemctl is-active --quiet kibana; then
            exit 2
          fi
          HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' http://localhost:5601/api/status 2>/dev/null) || true
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
            exit 0
          fi
          exit 1
      register: _kibana_wait_result
      until: _kibana_wait_result.rc == 0
      retries: 60
      delay: 5
      changed_when: false
      failed_when: _kibana_wait_result.rc == 2

  rescue:
    - name: Get recent Kibana journal output
      ansible.builtin.command:
        cmd: journalctl -u kibana --no-pager -n 50
      register: _kibana_wait_journal
      changed_when: false

    - name: Fail with Kibana diagnostics (service crashed)
      ansible.builtin.fail:
        msg: |
          Kibana service died while waiting for HTTP readiness.

          Recent log output:
          {{ _kibana_wait_journal.stdout }}
      when: _kibana_wait_result.rc | default(0) == 2

    - name: Fail with Kibana diagnostics (HTTP timeout)
      ansible.builtin.fail:
        msg: |
          Kibana HTTP did not become ready within 300s.
          Service state: {{ _kibana_wait_result.stdout | default('unknown') }}

          Recent log output:
          {{ _kibana_wait_journal.stdout }}
      when: _kibana_wait_result.rc | default(0) != 2

