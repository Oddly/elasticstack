---
# Kibana keystore management — moves secrets out of kibana.yml
# Mirrors the pattern in elasticsearch-keystore.yml

# --- Keystore password file (when keystore encryption is enabled) ---

- name: Ensure systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/kibana.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write keystore password file
  ansible.builtin.copy:
    content: "{{ kibana_keystore_password }}"
    dest: /etc/kibana/.keystore_password
    owner: root
    group: kibana
    mode: "0640"
  no_log: true
  when: kibana_keystore_password | length > 0

- name: Remove keystore password file when not needed
  ansible.builtin.file:
    path: /etc/kibana/.keystore_password
    state: absent
  when: kibana_keystore_password | length == 0

- name: Configure systemd keystore passphrase file
  ansible.builtin.copy:
    content: |
      [Service]
      Environment="KBN_KEYSTORE_PASSPHRASE_FILE=/etc/kibana/.keystore_password"
    dest: /etc/systemd/system/kibana.service.d/keystore-password.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart Kibana
  when: kibana_keystore_password | length > 0

- name: Remove systemd keystore passphrase override when not needed
  ansible.builtin.file:
    path: /etc/systemd/system/kibana.service.d/keystore-password.conf
    state: absent
  notify:
    - Reload systemd
    - Restart Kibana
  when: kibana_keystore_password | length == 0

# --- Build environment dict for keystore commands ---

- name: Set keystore command environment
  ansible.builtin.set_fact:
    _kibana_keystore_env: >-
      {{ {'KBN_KEYSTORE_PASSPHRASE_FILE': '/etc/kibana/.keystore_password'}
         if kibana_keystore_password | length > 0
         else {} }}

# --- Create keystore ---

- name: Create Kibana keystore
  ansible.builtin.command: /usr/share/kibana/bin/kibana-keystore create
  args:
    creates: /etc/kibana/kibana.keystore
  when: kibana_keystore_password | length == 0

- name: Create password-protected Kibana keystore
  ansible.builtin.command: /usr/share/kibana/bin/kibana-keystore create --password
  args:
    creates: /etc/kibana/kibana.keystore
    stdin: "{{ kibana_keystore_password }}"
  no_log: true
  when: kibana_keystore_password | length > 0

- name: List Kibana keystore entries
  ansible.builtin.command: /usr/share/kibana/bin/kibana-keystore list
  environment: "{{ _kibana_keystore_env }}"
  changed_when: false
  register: _kibana_keystore

# --- elasticsearch.password ---

- name: Get elasticsearch.password from keystore
  ansible.builtin.command: /usr/share/kibana/bin/kibana-keystore show elasticsearch.password
  environment: "{{ _kibana_keystore_env }}"
  when:
    - "'elasticsearch.password' in _kibana_keystore.stdout_lines"
    - kibana_security | bool
  register: _kibana_ks_es_password
  no_log: true
  changed_when: false
  ignore_errors: "{{ ansible_check_mode }}"

- name: Set elasticsearch.password in keystore
  ansible.builtin.command: >
    /usr/share/kibana/bin/kibana-keystore
    add -x -f 'elasticsearch.password'
  args:
    stdin: "{{ kibana_password.stdout }}"
  environment: "{{ _kibana_keystore_env }}"
  changed_when: false
  no_log: true
  when:
    - kibana_security | bool
    - >-
      _kibana_ks_es_password.stdout is undefined or
      kibana_password.stdout != _kibana_ks_es_password.stdout
  notify:
    - Restart Kibana

- name: Remove elasticsearch.password from keystore
  ansible.builtin.command: >
    /usr/share/kibana/bin/kibana-keystore
    remove elasticsearch.password
  environment: "{{ _kibana_keystore_env }}"
  changed_when: true
  when:
    - "'elasticsearch.password' in _kibana_keystore.stdout_lines"
    - not kibana_security | bool
  notify:
    - Restart Kibana

# --- server.ssl.keystore.password ---

- name: Get server.ssl.keystore.password from keystore
  ansible.builtin.command: /usr/share/kibana/bin/kibana-keystore show server.ssl.keystore.password
  environment: "{{ _kibana_keystore_env }}"
  when:
    - "'server.ssl.keystore.password' in _kibana_keystore.stdout_lines"
    - kibana_tls | bool
  register: _kibana_ks_ssl_password
  no_log: true
  changed_when: false
  ignore_errors: "{{ ansible_check_mode }}"

- name: Set server.ssl.keystore.password in keystore
  ansible.builtin.command: >
    /usr/share/kibana/bin/kibana-keystore
    add -x -f 'server.ssl.keystore.password'
  args:
    stdin: >-
      {{ kibana_tls_certificate_passphrase
         if kibana_cert_source == 'external' and _kibana_cert_format | default('') == 'p12'
         else kibana_tls_key_passphrase }}
  environment: "{{ _kibana_keystore_env }}"
  changed_when: false
  no_log: true
  when:
    - kibana_tls | bool
    - _kibana_cert_format | default('p12') == 'p12' or kibana_cert_source == 'elasticsearch_ca'
    - >-
      _kibana_ks_ssl_password.stdout is undefined or
      (kibana_tls_certificate_passphrase
       if kibana_cert_source == 'external' and _kibana_cert_format | default('') == 'p12'
       else kibana_tls_key_passphrase) != _kibana_ks_ssl_password.stdout
  notify:
    - Restart Kibana

- name: Remove server.ssl.keystore.password from keystore
  ansible.builtin.command: >
    /usr/share/kibana/bin/kibana-keystore
    remove server.ssl.keystore.password
  environment: "{{ _kibana_keystore_env }}"
  changed_when: true
  when:
    - "'server.ssl.keystore.password' in _kibana_keystore.stdout_lines"
    - not kibana_tls | bool or
      (_kibana_cert_format | default('') == 'pem' and kibana_cert_source == 'external')
  notify:
    - Restart Kibana

# --- xpack.security.encryptionKey ---

- name: Get xpack.security.encryptionKey from keystore
  ansible.builtin.command: /usr/share/kibana/bin/kibana-keystore show xpack.security.encryptionKey
  environment: "{{ _kibana_keystore_env }}"
  when:
    - "'xpack.security.encryptionKey' in _kibana_keystore.stdout_lines"
    - kibana_security | bool
  register: _kibana_ks_encryption_key
  no_log: true
  changed_when: false
  ignore_errors: "{{ ansible_check_mode }}"

- name: Set xpack.security.encryptionKey in keystore
  ansible.builtin.command: >
    /usr/share/kibana/bin/kibana-keystore
    add -x -f 'xpack.security.encryptionKey'
  args:
    stdin: "{{ kibana_encryption_key.content | b64decode | trim }}"
  environment: "{{ _kibana_keystore_env }}"
  changed_when: false
  no_log: true
  when:
    - kibana_security | bool
    - >-
      _kibana_ks_encryption_key.stdout is undefined or
      (kibana_encryption_key.content | b64decode | trim) != _kibana_ks_encryption_key.stdout
  notify:
    - Restart Kibana

# --- xpack.encryptedSavedObjects.encryptionKey ---

- name: Get xpack.encryptedSavedObjects.encryptionKey from keystore
  ansible.builtin.command: /usr/share/kibana/bin/kibana-keystore show xpack.encryptedSavedObjects.encryptionKey
  environment: "{{ _kibana_keystore_env }}"
  when:
    - "'xpack.encryptedSavedObjects.encryptionKey' in _kibana_keystore.stdout_lines"
    - kibana_security | bool
  register: _kibana_ks_saved_objects_key
  no_log: true
  changed_when: false
  ignore_errors: "{{ ansible_check_mode }}"

- name: Set xpack.encryptedSavedObjects.encryptionKey in keystore
  ansible.builtin.command: >
    /usr/share/kibana/bin/kibana-keystore
    add -x -f 'xpack.encryptedSavedObjects.encryptionKey'
  args:
    stdin: "{{ kibana_savedobjects_encryption_key.content | b64decode | trim }}"
  environment: "{{ _kibana_keystore_env }}"
  changed_when: false
  no_log: true
  when:
    - kibana_security | bool
    - >-
      _kibana_ks_saved_objects_key.stdout is undefined or
      (kibana_savedobjects_encryption_key.content | b64decode | trim) != _kibana_ks_saved_objects_key.stdout
  notify:
    - Restart Kibana

# --- Keystore permissions ---

- name: Ensure Kibana keystore permissions
  ansible.builtin.file:
    path: /etc/kibana/kibana.keystore
    owner: root
    group: kibana
    mode: "0660"
