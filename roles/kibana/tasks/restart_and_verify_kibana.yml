---

- name: Restart and verify Kibana
  block:
    - name: Restart Kibana service
      ansible.builtin.service:
        name: kibana
        state: restarted

    - name: Verify Kibana is running
      ansible.builtin.systemd:
        name: kibana
      register: _kibana_service_state
      until: _kibana_service_state.status.ActiveState == 'active'
      retries: 5
      delay: 3

  rescue:
    - name: Get recent Kibana journal output
      ansible.builtin.command:
        cmd: journalctl -u kibana --no-pager -n 50
      register: _kibana_journal
      changed_when: false

    - name: Fail with Kibana startup diagnostics
      ansible.builtin.fail:
        msg: |
          Kibana failed to start.

          Recent log output:
          {{ _kibana_journal.stdout }}
