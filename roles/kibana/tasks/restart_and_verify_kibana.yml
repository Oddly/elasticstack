---

- name: Restart and verify Kibana
  block:
    - name: Restart Kibana service
      ansible.builtin.service:
        name: kibana
        state: restarted

    - name: Verify Kibana is running
      ansible.builtin.systemd:
        name: kibana
      register: _kibana_service_state
      until: _kibana_service_state.status.ActiveState == 'active'
      retries: 5
      delay: 3

    - name: Wait for Kibana HTTP readiness
      ansible.builtin.shell:
        cmd: |
          HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' http://localhost:5601/api/status 2>/dev/null) || true
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
            exit 0
          fi
          exit 1
      register: _kibana_http_check
      until: _kibana_http_check.rc == 0
      retries: 60
      delay: 5
      changed_when: false

  rescue:
    - name: Get recent Kibana journal output
      ansible.builtin.command:
        cmd: journalctl -u kibana --no-pager -n 50
      register: _kibana_journal
      changed_when: false

    - name: Fail with Kibana startup diagnostics
      ansible.builtin.fail:
        msg: |
          Kibana failed to start.

          Recent log output:
          {{ _kibana_journal.stdout }}
