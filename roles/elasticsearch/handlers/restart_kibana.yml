---
- name: Check if kibana is installed
  ansible.builtin.package_facts:
    manager: "auto"
  delegate_to: "{{ item }}"
  changed_when: false

- name: Restart Kibana
  ansible.builtin.service:
    name: kibana
    state: restarted
  delegate_to: "{{ item }}"
  when: "'kibana' in hostvars[item].ansible_facts.packages | default({})"
