# Rolling Upgrade of Elasticsearch
#
# Follows the official Elastic upgrade procedure:
#   https://www.elastic.co/docs/deploy-manage/upgrade/deployment-or-cluster/elasticsearch
#
# Recommended inventory ordering for multi-tier clusters:
#   frozen → cold → warm → hot → other data → ingest/coordinating → master
# The play must use serial: 1 so nodes upgrade one at a time.

---

# For now we support upgrade only for clusters with security enabled
# If you positively need support for safely upgrading clusters without security,
# feel free to open an issue at https://github.com/Oddly/ansible-collection-elasticstack/issues
- name: Set connection protocol to https
  ansible.builtin.set_fact:
    elasticsearch_http_protocol: "https"

- name: Check for running Elasticsearch service
  ansible.builtin.systemd:
    name: elasticsearch
  register: elasticsearch_running

- name: Update stopped services right away
  when:
    - elasticsearch_running.status.ActiveState == "inactive"
  block:
    - name: Update stopped Elasticsearch - rpm with managed repositories
      ansible.builtin.package:
        name: "{{ elasticsearch_package }}"
        enablerepo:
          - 'elastic-{{ elasticstack_release }}.x'
      when:
        - ansible_facts.os_family == "RedHat"
        - elasticstack_full_stack | bool

    - name: Update stopped Elasticsearch - deb or unmanaged repositories rpm
      ansible.builtin.package:
        name: "{{ elasticsearch_package }}"
      when:
        - ansible_facts.os_family == "Debian" or
          not elasticstack_full_stack | bool

- name: Update single instances without extra caution
  when:
    - groups[elasticstack_elasticsearch_group_name] | length == 1
  block:
    - name: Update single instances without extra caution - deb or unmanaged repositories rpm
      ansible.builtin.package:
        name: "{{ elasticsearch_package }}"
      when:
        - ansible_facts.os_family == "Debian" or
          not elasticstack_full_stack | bool
      notify:
        - Restart Elasticsearch

    - name: Update single instances without extra caution - rpm with managed repositories
      ansible.builtin.package:
        name: "{{ elasticsearch_package }}"
        enablerepo:
          - 'elastic-{{ elasticstack_release }}.x'
      when:
        - ansible_facts.os_family == "RedHat"
        - elasticstack_full_stack | bool
      notify:
        - Restart Elasticsearch


- name: Be careful about upgrade when Elasticsearch is running
  when:
    - elasticsearch_running.status.ActiveState == "active"
    - groups[elasticstack_elasticsearch_group_name] | length > 1
  block:

    # After a previous node's upgrade, the local ES instance may need time to
    # re-discover the master (e.g. during 8.x→9.x rolling upgrades). Wait for
    # the cluster API to respond with 200 before attempting any cluster operations.
    # During cross-major-version rolling upgrades (8→9), an old-version node may
    # be permanently unable to reach the new master — that's OK, we'll skip the
    # pre-upgrade cluster operations and proceed directly to stop/upgrade/start.
    - name: Wait for Elasticsearch cluster API to be responsive
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_cluster/health"
        method: GET
        user: elastic
        password: "{{ elasticstack_password.stdout }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        force_basic_auth: true
        status_code: [200, 503]
      register: elasticsearch_responsive
      until: (elasticsearch_responsive.status | default(0)) == 200
      retries: 12
      delay: 10
      ignore_errors: true
      no_log: "{{ elasticstack_no_log }}"
      changed_when: false

    - name: Set cluster reachability flag
      ansible.builtin.set_fact:
        _elasticsearch_cluster_reachable: "{{ (elasticsearch_responsive.status | default(0)) == 200 }}"

    - name: Warn if cluster API is unreachable (cross-major upgrade)
      ansible.builtin.debug:
        msg: >-
          Cluster API returned {{ elasticsearch_responsive.status | default('unknown') }}
          after retries — skipping pre-upgrade cluster operations.
          This is expected during cross-major rolling upgrades (e.g. 8.x→9.x).
      when: not _elasticsearch_cluster_reachable | bool

    # Usually we should not need this step. It's only there to recover from broken upgrade plays
    # Without this step the cluster would never recover and the play would always fail
    - name: Enable shard allocation for the cluster
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_cluster/settings"
        method: PUT
        body: '{ "persistent": { "cluster.routing.allocation.enable": null }}'
        body_format: json
        user: elastic
        password: "{{ elasticstack_password.stdout }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        force_basic_auth: true
      register: elasticsearch_response
      until: (elasticsearch_response.json | default({})).acknowledged | default(false)
      retries: 10
      delay: 30
      no_log: "{{ elasticstack_no_log }}"
      when: _elasticsearch_cluster_reachable | bool

      # this step is key!!!  Don't restart more nodes
      # until all shards have completed recovery
    - name: Wait for cluster health to return to green
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_cluster/health"
        method: GET
        user: elastic
        password: "{{ elasticstack_password.stdout }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        force_basic_auth: true
      register: elasticsearch_response
      until: ((elasticsearch_response.json | default({})).status | default('')) in ['green', 'yellow']
      retries: 50
      delay: 30
      no_log: "{{ elasticstack_no_log }}"
      changed_when: false
      when: _elasticsearch_cluster_reachable | bool

    # Disable replica allocation so the cluster doesn't waste I/O replicating
    # shards that will come back when the node restarts.  Use "primaries" rather
    # than "none" per the official upgrade docs — primaries still need to be
    # assigned for indexing to continue during the upgrade.
    - name: Disable shard allocation for the cluster
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_cluster/settings"
        method: PUT
        body: '{ "persistent": { "cluster.routing.allocation.enable": "primaries" }}'
        body_format: json
        user: elastic
        password: "{{ elasticstack_password.stdout }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        force_basic_auth: true
      register: elasticsearch_response
      until: (elasticsearch_response.json | default({})).acknowledged | default(false)
      retries: 5
      delay: 10
      no_log: "{{ elasticstack_no_log }}"
      when: _elasticsearch_cluster_reachable | bool

    # Put ML into upgrade mode so jobs are suspended gracefully and model
    # state is saved.  This is idempotent — calling it when already in
    # upgrade mode or when ML is disabled is a no-op (returns 200).
    - name: Set ML upgrade mode
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_ml/set_upgrade_mode?enabled=true"
        method: POST
        user: elastic
        password: "{{ elasticstack_password.stdout }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        force_basic_auth: true
        status_code: [200]
      register: _elasticsearch_ml_upgrade_mode
      failed_when: false
      no_log: "{{ elasticstack_no_log }}"
      when:
        - _elasticsearch_cluster_reachable | bool
        - elasticsearch_ml_enabled | bool

    - name: Flush indices to speed up shard recovery
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_flush"
        method: POST
        user: elastic
        password: "{{ elasticstack_password.stdout }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        force_basic_auth: true
      register: elasticsearch_flush_response
      failed_when: false
      no_log: "{{ elasticstack_no_log }}"
      when: _elasticsearch_cluster_reachable | bool

    - name: Warn if flush failed
      ansible.builtin.debug:
        msg: "Flush returned status {{ elasticsearch_flush_response.status | default('unknown') }}: {{ elasticsearch_flush_response.msg | default('') }}"
      when:
        - _elasticsearch_cluster_reachable | bool
        - (elasticsearch_flush_response.status | default(0)) != 200

    - name: Shutdown elasticsearch service
      ansible.builtin.service:
        name: elasticsearch
        enabled: true
        state: stopped
      when:
        - not elasticsearch_unsafe_upgrade_restart | bool

    - name: Update Elasticsearch - rpm with managed repositories
      ansible.builtin.package:
        name: "{{ elasticsearch_package }}"
        enablerepo:
          - 'elastic-{{ elasticstack_release }}.x'
      when:
        - ansible_facts.os_family == "RedHat"
        - elasticstack_full_stack | bool

    - name: Update Elasticsearch - deb or unmanaged repositories rpm
      ansible.builtin.package:
        name: "{{ elasticsearch_package }}"
      when:
        - ansible_facts.os_family == "Debian" or
          not elasticstack_full_stack | bool

    - name: Start elasticsearch
      ansible.builtin.service:
        name: elasticsearch
        enabled: true
        state: started
      when:
        - elasticsearch_running.status.ActiveState == "active"
        - not elasticsearch_unsafe_upgrade_restart | bool

    - name: Restart elasticsearch (fast, for non-prod)
      ansible.builtin.service:
        name: elasticsearch
        enabled: true
        state: restarted
      when:
        - elasticsearch_running.status.ActiveState == "active"
        - elasticsearch_unsafe_upgrade_restart | bool

    - name: Wait for elasticsearch node to come back up if it was stopped
      ansible.builtin.wait_for:
        host: "{{ elasticsearch_api_host }}"
        port: "{{ elasticstack_elasticsearch_http_port }}"
        delay: 30
        timeout: 600

    - name: Confirm the node joins the cluster
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_cat/nodes?h=name"
        method: GET
        user: elastic
        password: "{{ elasticstack_password.stdout }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        force_basic_auth: true
        return_content: true
      register: elasticsearch_result
      until: elasticsearch_nodename in (elasticsearch_result.content | default('')).split()
      retries: 200
      delay: 3
      no_log: "{{ elasticstack_no_log }}"
      changed_when: false

    - name: Enable shard allocation for the cluster
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_cluster/settings"
        method: PUT
        body: '{ "persistent": { "cluster.routing.allocation.enable": null }}'
        body_format: json
        user: elastic
        password: "{{ elasticstack_password.stdout }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        force_basic_auth: true
      register: elasticsearch_response
      until: (elasticsearch_response.json | default({})).acknowledged | default(false)
      retries: 5
      delay: 30
      no_log: "{{ elasticstack_no_log }}"

    - name: Wait for cluster health to return to yellow or green
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_cluster/health"
        method: GET
        user: elastic
        password: "{{ elasticstack_password.stdout }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        force_basic_auth: true
      register: elasticsearch_response
      until: ((elasticsearch_response.json | default({})).status | default('')) in ['green', 'yellow']
      retries: 30
      delay: 30
      no_log: "{{ elasticstack_no_log }}"
      changed_when: false

    # Take ML out of upgrade mode so jobs resume on the upgraded node.
    - name: Disable ML upgrade mode
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_ml/set_upgrade_mode?enabled=false"
        method: POST
        user: elastic
        password: "{{ elasticstack_password.stdout }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        force_basic_auth: true
        status_code: [200]
      register: _elasticsearch_ml_upgrade_mode_off
      failed_when: false
      no_log: "{{ elasticstack_no_log }}"
      when:
        - elasticsearch_ml_enabled | bool
        - _elasticsearch_ml_upgrade_mode is defined
        - (_elasticsearch_ml_upgrade_mode.status | default(0)) == 200

    - name: Record that rolling upgrade performed its own restart
      ansible.builtin.set_fact:
        _elasticsearch_rolling_upgrade_performed: true
