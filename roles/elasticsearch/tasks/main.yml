---

- name: Gather package facts for upgrade validation
  ansible.builtin.package_facts:
    manager: auto

# Detect whether a rolling upgrade is needed. Any version change — major,
# minor, or patch — should restart nodes one at a time with shard allocation
# management rather than restarting all nodes simultaneously.
#
# Pre-install detection covers cases where we know the target version:
# 1. Pinned version higher than installed (elasticstack_version: "9.2.0")
# 2. Major version change (elasticstack_release differs from installed)
#
# For "latest" mode, we can't know pre-install whether a newer version is
# available. The normal package tasks handle installation with state: latest,
# and if the package changed, a rolling restart is triggered post-install.
- name: Detect if rolling upgrade is needed (pre-install)
  ansible.builtin.set_fact:
    _elasticsearch_needs_rolling_upgrade: >-
      {{ ansible_facts.packages['elasticsearch'] is defined and
         ansible_facts.packages['elasticsearch'][0].version is defined and
         ((elasticstack_version is defined and
           elasticstack_version != 'latest' and
           elasticstack_version is version(ansible_facts.packages['elasticsearch'][0].version, '>'))
          or
          (elasticstack_release | int != (ansible_facts.packages['elasticsearch'][0].version.split('.')[0] | int))) }}

- name: Check upgrade path requirement for ES 9.x
  ansible.builtin.fail:
    msg: |
      UPGRADE PATH VIOLATION: Elasticsearch 9.x requires 8.19.x first.
      Current version: {{ ansible_facts.packages['elasticsearch'][0].version }}
      You must upgrade to 8.19.x before upgrading to 9.x.
      See: https://www.elastic.co/docs/deploy-manage/upgrade/deployment-or-cluster
  when:
    - elasticstack_release | int >= 9
    - ansible_facts.packages['elasticsearch'] is defined
    - ansible_facts.packages['elasticsearch'][0].version is version('8.0.0', '>=')
    - ansible_facts.packages['elasticsearch'][0].version is version('8.19.0', '<')

- name: Include global role
  ansible.builtin.import_role:
    name: oddly.elasticstack.elasticstack
  when: not hostvars[inventory_hostname]._elasticstack_role_imported | default(false)

- name: Main | Propagate stack-level security setting
  ansible.builtin.set_fact:
    elasticsearch_security: "{{ elasticstack_security | bool }}"
  when:
    - elasticstack_full_stack | bool
    - not elasticstack_security | bool

- name: Check-set-parameters
  ansible.builtin.include_tasks: elasticsearch-parameters.yml

- name: Include OS specific vars
  ansible.builtin.include_vars: '{{ item }}'
  with_first_found:
    - '{{ ansible_facts.os_family }}_{{ ansible_facts.distribution_major_version }}.yml'
    - '{{ ansible_facts.os_family }}.yml'

- name: Detect cgroup memory limit
  ansible.builtin.slurp:
    src: /sys/fs/cgroup/memory.max
  register: _elasticsearch_cgroup_memory
  failed_when: false
  changed_when: false

# In containers the kernel exposes host RAM via /proc/meminfo but the actual
# usable memory is capped by the cgroup limit.  When the cgroup limit is lower
# than physical RAM, recalculate heap from the cgroup limit so ES doesn't OOM.
# Only recalculate when the user has not explicitly set elasticsearch_heap
# (detected by comparing with the default formula based on memtotal_mb).
- name: Recalculate heap from cgroup memory limit
  vars:
    _es_cgroup_bytes: "{{ (_elasticsearch_cgroup_memory.content | b64decode | trim) | int }}"
    _es_cgroup_mb: "{{ (_es_cgroup_bytes | int) // 1048576 }}"
    _es_default_heap: "{{ [[(ansible_facts.memtotal_mb // 1024) // 2, 30] | min, 1] | max }}"
  ansible.builtin.set_fact:
    elasticsearch_heap: >-
      {{ [[(_es_cgroup_mb | int) // 1024 // 2, 30] | min, 1] | max }}
  when:
    - _elasticsearch_cgroup_memory.content is defined
    - (_elasticsearch_cgroup_memory.content | b64decode | trim) != 'max'
    - _es_cgroup_bytes | int < (ansible_facts.memtotal_mb | int) * 1048576
    - elasticsearch_heap | int == _es_default_heap | int

- name: Set node name if not overriden by user
  ansible.builtin.set_fact:
    elasticsearch_nodename: "{{ ansible_facts.hostname }}"
  when:
    - elasticsearch_nodename is undefined

- name: Set common password for common certificates
  ansible.builtin.set_fact:
    elasticsearch_tls_key_passphrase: "{{ elasticstack_cert_pass }}"
  when:
    - elasticstack_cert_pass is defined
  tags:
    - certificates
    - renew_ca
    - renew_es_cert

- name: Check if cluster is already set up
  ansible.builtin.stat:
    path: "{{ elasticsearch_initialized_file }}"
  register: elasticsearch_cluster_setup_check
  failed_when: false

- name: Set var that cluster is set up
  ansible.builtin.set_fact:
    elasticsearch_cluster_set_up: true
  when:
    - elasticsearch_cluster_setup_check is defined
    - elasticsearch_cluster_setup_check.stat.exists | bool

- name: Set var that cluster is not set up
  ansible.builtin.set_fact:
    elasticsearch_cluster_set_up: false
  when:
    - elasticsearch_cluster_setup_check is undefined or
      not elasticsearch_cluster_setup_check.stat.exists | bool

- name: Check if master node count is correct
  when:
    - elasticsearch_node_types is defined
  block:

    # the following is a way to simplify handling information
    # about nodes. For some tasks it's only important if a node
    # has a specific roles and the others are irrelevant
    #
    - name: Set node role variable to master
      ansible.builtin.set_fact:
        elasticsearch_role: "master"
      when:
        - "'master' in elasticsearch_node_types"

    - name: Set node role variable to data
      ansible.builtin.set_fact:
        elasticsearch_role: "data"
      when:
        - "'master' not in elasticsearch_node_types"
        - "'data' in elasticsearch_node_types"

    - name: Set node role variable to other
      ansible.builtin.set_fact:
        elasticsearch_role: "other"
      when:
        - "'master' not in elasticsearch_node_types"
        - "'data' not in elasticsearch_node_types"

    - name: Create groups of nodes
      ansible.builtin.group_by:
        key: "elasticsearch_role_{{ elasticsearch_role }}"
      changed_when: false

    - name: Count master nodes
      ansible.builtin.set_fact:
        elasticsearch_count_of_master_nodes: "{{ groups['elasticsearch_role_master'] | length }}"

    - name: Check count of master nodes
      ansible.builtin.fail:
        msg: "There must be an odd count of master nodes. You have {{ elasticsearch_count_of_master_nodes }}"
      when:
        - elasticsearch_count_of_master_nodes | int % 2  == 0

    - name: End play in checks
      ansible.builtin.meta: end_host
      when: elasticsearch_check_calculation | bool

- name: Install openssl if security is activated
  ansible.builtin.package:
    name: openssl
  register: _elasticsearch_openssl_install
  until: _elasticsearch_openssl_install is success
  retries: 3
  delay: 10
  when: elasticsearch_security | bool

# the following should be done by the rpm but failed with 7.4
- name: Set ulimits for Elasticsearch (soft)
  community.general.pam_limits:
    limit_item: nofile
    domain: elasticsearch
    value: 65535
    limit_type: soft
  when:
    - elasticsearch_pamlimits | bool

- name: Set ulimits for Elasticsearch (hard)
  community.general.pam_limits:
    limit_item: nofile
    domain: elasticsearch
    value: 65535
    limit_type: hard
  when:
    - elasticsearch_pamlimits | bool

# OS-level tuning required for production Elasticsearch.
# vm.max_map_count is required — ES refuses to start without it.
# The rest are strongly recommended by Elastic's production checklist.
- name: Apply OS-level sysctl settings for Elasticsearch
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { name: vm.max_map_count, value: "262144" }
    - { name: vm.swappiness, value: "1" }
    - { name: net.ipv4.tcp_retries2, value: "5" }
  loop_control:
    label: "{{ item.name }}={{ item.value }}"
  when:
    - elasticsearch_os_tuning | bool
    - ansible_facts.virtualization_type | default('') not in ['docker', 'container', 'containerd', 'lxc', 'podman']

- name: Disable Transparent Huge Pages (runtime)
  ansible.builtin.shell: |
    echo never > /sys/kernel/mm/transparent_hugepage/enabled
    echo never > /sys/kernel/mm/transparent_hugepage/defrag
  changed_when: false
  when:
    - elasticsearch_os_tuning | bool
    - ansible_facts.virtualization_type | default('') not in ['docker', 'container', 'containerd', 'lxc', 'podman']
  failed_when: false  # may fail where sysfs is read-only

- name: Disable Transparent Huge Pages (persistent via tmpfiles)
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/elasticsearch-thp.conf
    content: |
      w /sys/kernel/mm/transparent_hugepage/enabled - - - - never
      w /sys/kernel/mm/transparent_hugepage/defrag - - - - never
    owner: root
    group: root
    mode: "0644"
  when:
    - elasticsearch_os_tuning | bool
    - ansible_facts.virtualization_type | default('') not in ['docker', 'container', 'containerd', 'lxc', 'podman']

- name: Construct exact name of Elasticsearch package
  ansible.builtin.set_fact:
    elasticsearch_package: >-
      {{
      'elasticsearch' +
      ((elasticstack_versionseparator +
      elasticstack_version |
      string) if (elasticstack_version is defined and elasticstack_version | length > 0 and elasticstack_version != 'latest') else '') |
      replace(' ', '')
      }}

- name: "WARNING: Rolling upgrade will be performed"
  ansible.builtin.pause:
    seconds: "{{ elasticsearch_upgrade_countdown | default(10) }}"
    prompt: >-
      Elasticsearch {{ ansible_facts.packages['elasticsearch'][0].version }}
      will be upgraded to {{ elasticstack_version | default('latest ' ~ elasticstack_release ~ '.x') }}.
      Nodes will be restarted one at a time with shard allocation management.
      Press Ctrl+C to abort, or wait {{ elasticsearch_upgrade_countdown | default(10) }} seconds to continue.
  when:
    - _elasticsearch_needs_rolling_upgrade | bool
    - ansible_facts.packages['elasticsearch'] is defined
  run_once: true

# Write config files BEFORE the rolling upgrade so the upgrade restart picks
# up new config in a single restart. Without this, the rolling upgrade restarts
# with old config, then config tasks change files and notify the handler,
# causing a second uncontrolled restart.
- name: Write config before rolling upgrade
  when: _elasticsearch_needs_rolling_upgrade | bool
  block:
    - name: Configure Elasticsearch (pre-upgrade)
      ansible.builtin.template:
        src: elasticsearch.yml.j2
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: root
        mode: "0644"
        backup: "{{ elasticsearch_config_backup }}"
      when: elasticsearch_manage_yaml | bool

    - name: Set jvm heap size (pre-upgrade)
      ansible.builtin.template:
        src: "jvm.options.d/heap.options.j2"
        dest: "{{ elasticsearch_conf_dir }}/jvm.options.d/10-heap.options"
        owner: root
        group: "{{ elasticsearch_group }}"
        mode: "0660"
        force: true
      when: elasticsearch_heap is defined and (elasticsearch_heap | string | length > 0)

    - name: Set jvm paths (pre-upgrade)
      ansible.builtin.template:
        src: "jvm.options.d/paths.options.j2"
        dest: "{{ elasticsearch_conf_dir }}/jvm.options.d/50-paths.options"
        owner: root
        group: "{{ elasticsearch_group }}"
        mode: "0660"
        force: true

    - name: Set jvm custom options (pre-upgrade)
      ansible.builtin.template:
        src: "jvm.options.d/custom.options.j2"
        dest: "{{ elasticsearch_conf_dir }}/jvm.options.d/90-custom.options"
        owner: root
        group: "{{ elasticsearch_group }}"
        mode: "0660"
        force: true
      when: elasticsearch_jvm_custom_parameters is defined and (elasticsearch_jvm_custom_parameters | string | length > 0)

- name: Update Elasticsearch if needed
  ansible.builtin.include_tasks: elasticsearch-rolling-upgrade.yml
  loop: "{{ groups[elasticstack_elasticsearch_group_name] }}"
  when:
    - "hostvars[item].inventory_hostname == inventory_hostname"
    - _elasticsearch_needs_rolling_upgrade | bool
    - elasticstack_password.stdout is defined

# NOTE: When elasticstack_version is "latest", state: latest means the package
# manager installs the newest available version. If a newer version is installed,
# the post-install detection below triggers a rolling restart (node-by-node with
# shard allocation management). This is intentional — even minor upgrades should
# not restart all nodes at once.
- name: Install Elasticsearch - rpm - full stack
  ansible.builtin.package:
    name: "{{ elasticsearch_package }}"
    state: "{{ 'latest' if (elasticstack_version | default('') == 'latest') else 'present' }}"
    enablerepo:
      - 'elastic-{{ elasticstack_release }}.x'
  register: _elasticsearch_install_rpm_full
  until: _elasticsearch_install_rpm_full is success
  retries: 3
  delay: 10
  when:
    - ansible_facts.os_family == "RedHat"
    - elasticstack_full_stack | bool

- name: Install Elasticsearch - rpm - standalone
  ansible.builtin.package:
    name: "{{ elasticsearch_package }}"
    state: "{{ 'latest' if (elasticstack_version | default('') == 'latest') else 'present' }}"
  register: _elasticsearch_install_rpm
  until: _elasticsearch_install_rpm is success
  retries: 3
  delay: 10
  when:
    - ansible_facts.os_family == "RedHat"
    - not elasticstack_full_stack | bool

- name: Install Elasticsearch - deb
  ansible.builtin.package:
    name: "{{ elasticsearch_package }}"
    state: "{{ 'latest' if (elasticstack_version | default('') == 'latest') else 'present' }}"
  register: _elasticsearch_install_deb
  until: _elasticsearch_install_deb is success
  retries: 3
  delay: 10
  when:
    - ansible_facts.os_family == "Debian"

# If a normal package install (not the rolling upgrade path) changed the
# package, we need a rolling restart to avoid bringing all nodes down at
# once. This covers the "latest" case where we didn't know pre-install
# whether a newer version was available.
- name: Detect if package was upgraded (post-install)
  ansible.builtin.set_fact:
    _elasticsearch_package_upgraded: >-
      {{ (_elasticsearch_install_rpm_full.changed | default(false)) or
         (_elasticsearch_install_rpm.changed | default(false)) or
         (_elasticsearch_install_deb.changed | default(false)) }}
  when: not (_elasticsearch_needs_rolling_upgrade | bool)

- name: Rolling restart after package upgrade
  ansible.builtin.include_tasks: elasticsearch-rolling-upgrade.yml
  loop: "{{ groups[elasticstack_elasticsearch_group_name] }}"
  when:
    - "hostvars[item].inventory_hostname == inventory_hostname"
    - not (_elasticsearch_needs_rolling_upgrade | bool)
    - _elasticsearch_package_upgraded | default(false) | bool
    - elasticstack_password.stdout is defined

# Pre-detect external cert state so the template renders consistently
# across first and subsequent runs (idempotency).
- name: Detect existing external CA for template rendering
  ansible.builtin.stat:
    path: /etc/elasticsearch/certs/ca.crt
  register: _elasticsearch_existing_ca_cert
  when: elasticsearch_cert_source == 'external'

- name: Set external CA availability for initial template render
  ansible.builtin.set_fact:
    _elasticsearch_external_has_ca: true
  when:
    - elasticsearch_cert_source == 'external'
    - (_elasticsearch_existing_ca_cert.stat.exists | default(false)) or
      (elasticsearch_tls_ca_certificate | default('') | length > 0) or
      (elasticsearch_tls_ca_certificate_content | default('') | length > 0)

- name: Warn about conflicting keys in elasticsearch_extra_config
  ansible.builtin.debug:
    msg: >-
      WARNING: The following keys in elasticsearch_extra_config are also
      managed by dedicated role variables and will be filtered out to
      prevent duplicate YAML keys: {{ _elasticsearch_extra_config_conflicts | join(', ') }}.
      Remove them from elasticsearch_extra_config and use the dedicated
      variables instead.
  vars:
    _elasticsearch_extra_config_conflicts: >-
      {{ elasticsearch_extra_config.keys() | list | intersect(_elasticsearch_managed_keys) }}
  when:
    - elasticsearch_extra_config is defined
    - _elasticsearch_extra_config_conflicts | length > 0

- name: Configure Elasticsearch
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: root
    group: root
    mode: "0644"
    backup: "{{ elasticsearch_config_backup }}"
  notify:
    - Restart Elasticsearch
  when: elasticsearch_manage_yaml | bool

- name: Configure Elasticsearch logging
  ansible.builtin.template:
    src: log4j2.properties.j2
    dest: /etc/elasticsearch/log4j2.properties
    owner: root
    group: elasticsearch
    mode: "0660"
    backup: "{{ elasticsearch_config_backup }}"
  notify: Restart Elasticsearch
  when: elasticsearch_manage_logging | bool

- name: Create Elasticsearch directory
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: elasticsearch
    group: elasticsearch
    mode: "2750"
  when: item.create | bool or item.path != item.default
  loop:
    - {create: "{{ elasticsearch_create_logpath }}", path: "{{ elasticsearch_logpath }}", default: "/var/log/elasticsearch"}
    - {create: "{{ elasticsearch_create_datapath }}", path: "{{ elasticsearch_datapath }}", default: "/var/lib/elasticsearch"}

- name: Activate JNA workaround (see README.md)
  ansible.builtin.lineinfile:
    path: "{{ elasticsearch_sysconfig_file }}"
    regexp: 'ES_JAVA_OPTS='
    line: 'ES_JAVA_OPTS="-Djna.tmpdir={{ elasticsearch_datapath }}/tmp"'
  notify:
    - Restart Elasticsearch
  when: elasticsearch_jna_workaround | bool

# Ansible 2.20+ is stricter about boolean coercion. For non-boolean variables
# (numbers, strings, lists), use 'VAR | string | length > 0' instead of bare
# truthiness checks. This pattern checks "has meaningful content" rather than
# "is truthy". Do NOT use this pattern for actual boolean variables.
- name: Set jvm heap size
  ansible.builtin.template:
    src: "jvm.options.d/heap.options.j2"
    dest: "{{ elasticsearch_conf_dir }}/jvm.options.d/10-heap.options"
    owner: root
    group: "{{ elasticsearch_group }}"
    mode: "0660"
    force: true
  notify: Restart Elasticsearch
  when: elasticsearch_heap is defined and (elasticsearch_heap | string | length > 0)

- name: Set jvm paths
  ansible.builtin.template:
    src: "jvm.options.d/paths.options.j2"
    dest: "{{ elasticsearch_conf_dir }}/jvm.options.d/50-paths.options"
    owner: root
    group: "{{ elasticsearch_group }}"
    mode: "0660"
    force: true
  notify: Restart Elasticsearch

- name: Set jvm custom options
  ansible.builtin.template:
    src: "jvm.options.d/custom.options.j2"
    dest: "{{ elasticsearch_conf_dir }}/jvm.options.d/90-custom.options"
    owner: root
    group: "{{ elasticsearch_group }}"
    mode: "0660"
    force: true
  notify: Restart Elasticsearch
  when: elasticsearch_jvm_custom_parameters is defined and (elasticsearch_jvm_custom_parameters | string | length > 0)

- name: Rolling upgrade completed
  ansible.builtin.debug:
    msg: >-
      A rolling upgrade was performed. Config files were written before the
      upgrade so the restart picked up new config. The handler restart is
      suppressed to prevent a second uncontrolled restart.
  when: _elasticsearch_rolling_upgrade_performed | default(false) | bool

- name: Create elasticsearch systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/elasticsearch.service.d
    state: directory
    mode: "0755"
  when: >-
    elasticsearch_systemd_override_type_exec | bool
    or elasticsearch_memory_lock | bool

- name: Override elasticsearch service type
  ansible.builtin.copy:
    dest: /etc/systemd/system/elasticsearch.service.d/override.conf
    content: |
      [Service]
      Type=exec
    mode: "0644"
  when: elasticsearch_systemd_override_type_exec | bool

- name: Set LimitMEMLOCK for memory locking
  ansible.builtin.copy:
    dest: /etc/systemd/system/elasticsearch.service.d/memlock.conf
    content: |
      [Service]
      LimitMEMLOCK=infinity
    mode: "0644"
  when: elasticsearch_memory_lock | bool
  notify: Restart Elasticsearch

- name: Force systemd to reread configs
  ansible.builtin.systemd:
    daemon_reload: true
  when: >-
    elasticsearch_systemd_override_type_exec | bool
    or elasticsearch_memory_lock | bool

- name: Import Tasks elasticsearch-security.yml
  ansible.builtin.import_tasks: elasticsearch-security.yml
  when:
    - elasticsearch_security | bool
  tags:
    - certificates
    - renew_ca
    - renew_es_cert

# ES 9.x auto-security writes SSL keystore entries during package install.
# When security is disabled these reference undefined config keys and ES
# refuses to start. Strip them before the first service start.
- name: Clean auto-security keystore entries when security is disabled
  when: not elasticsearch_security | bool
  block:
    - name: Check keystore exists (no-security)
      ansible.builtin.stat:
        path: /etc/elasticsearch/elasticsearch.keystore
      register: _elasticsearch_keystore_nosec

    - name: List keystore entries (no-security)
      ansible.builtin.command: /usr/share/elasticsearch/bin/elasticsearch-keystore list
      changed_when: false
      register: _elasticsearch_keystore_entries_nosec
      when: _elasticsearch_keystore_nosec.stat.exists

    - name: Remove orphaned SSL keystore entries
      ansible.builtin.command: >
        /usr/share/elasticsearch/bin/elasticsearch-keystore remove {{ item }}
      loop: "{{ _elasticsearch_keystore_entries_nosec.stdout_lines | default([]) | select('match', 'xpack\\.security\\.') | list }}"
      loop_control:
        label: "{{ item }}"
      changed_when: true
      when:
        - _elasticsearch_keystore_nosec.stat.exists
        - _elasticsearch_keystore_entries_nosec.stdout_lines is defined

- name: Start Elasticsearch
  ansible.builtin.service:
    name: elasticsearch
    state: started
    enabled: true
  register: _elasticsearch_freshstart
  when: not ansible_check_mode

# The comment in the following task will disable KICS security checks for this
# very line. In this state of the system we can only communicate without https
# so the finding is a false positive

- name: Handle cluster setup without security
  when: not elasticsearch_security | bool
  block:
    - name: Check for cluster status without security
      ansible.builtin.uri:
# kics-scan ignore-line
        url: "http://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_cluster/health?pretty"
      register: elasticsearch_cluster_status
      ignore_errors: "{{ ansible_check_mode }}"
      until: ((elasticsearch_cluster_status.json | default({})).status | default('')) in ['green', 'yellow']
      retries: 30
      delay: 10
      no_log: "{{ elasticstack_no_log }}"

    - name: Leave a file showing that the cluster is set up
      ansible.builtin.template:
        dest: "{{ elasticsearch_initialized_file }}"
        src: elasticsearch_initialized.j2
        owner: root
        group: root
        mode: "0600"

    - name: Set var that cluster is set up
      ansible.builtin.set_fact:
        elasticsearch_cluster_set_up: true

# See https://github.com/Oddly/ansible-collection-elasticstack/issues/137
# for details why we have this task again here. After security setup,
# facts like _elasticsearch_external_has_ca are now set, which may change
# the rendered template. Notify handler for the config change.
#
- name: Configure Elasticsearch
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: root
    group: root
    mode: "0644"
    backup: "{{ elasticsearch_config_backup }}"
  notify:
    - Restart Elasticsearch
  when: elasticsearch_manage_yaml | bool

- name: Show Info about heap
  ansible.builtin.debug:
    msg: >-
      Using {{ elasticsearch_heap | int * 1024 }} of
      {% if _elasticsearch_cgroup_memory.content is defined and (_elasticsearch_cgroup_memory.content | b64decode | trim) != 'max' %}
      {{ (_elasticsearch_cgroup_memory.content | b64decode | trim) | int // 1048576 }} MB (cgroup limit)
      {% else %}
      {{ ansible_facts.memtotal_mb }} MB
      {% endif %}
      as heap for Elasticsearch
  when: elasticsearch_heap is defined and (elasticsearch_heap | string | length > 0)

- name: Show hint about passwords
  ansible.builtin.debug:
    msg: >-
      {{ 'Elastic password set to user-defined value. Other service passwords are in '
         ~ elasticstack_initial_passwords
         if elasticsearch_elastic_password | default('') | length > 0
         else 'Remember, your temporary passwords can be found on '
         ~ elasticstack_ca_host ~ ' in ' ~ elasticstack_initial_passwords }}
  when:
    - elasticsearch_security | bool
    - inventory_hostname == elasticstack_ca_host

# -- Persistent cluster settings via _cluster/settings API --

- name: Build effective cluster settings
  ansible.builtin.set_fact:
    _elasticsearch_effective_cluster_settings: >-
      {{ (elasticsearch_logsdb | bool)
         | ternary({'cluster.logsdb.enabled': 'true'}, {})
         | combine(elasticsearch_cluster_settings | default({})) }}

- name: Apply persistent cluster settings  # noqa: run-once[task]
  when:
    - _elasticsearch_effective_cluster_settings | length > 0
    - elasticsearch_security | bool | ternary(elasticstack_password is defined and (elasticstack_password.stdout | default('') | length > 0), true)
    - not ansible_check_mode
  run_once: true
  delegate_to: "{{ elasticstack_ca_host | default(inventory_hostname) }}"
  block:
    - name: Read current persistent cluster settings
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_cluster/settings?flat_settings=true"
        method: GET
        user: "{{ 'elastic' if elasticsearch_security | bool else omit }}"
        password: "{{ elasticstack_password.stdout if elasticsearch_security | bool else omit }}"
        force_basic_auth: "{{ elasticsearch_security | bool }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        return_content: true
      register: _elasticsearch_current_cluster_settings
      no_log: "{{ elasticstack_no_log }}"

    - name: Check if settings already match
      ansible.builtin.set_fact:
        _elasticsearch_cluster_settings_changed: "{{ _needs_update | trim }}"
      vars:
        _current: "{{ _elasticsearch_current_cluster_settings.json.persistent }}"
        _needs_update: >-
          {% set ns = namespace(changed=false) %}
          {% for key, value in _elasticsearch_effective_cluster_settings.items() %}
          {%   if _current.get(key) is none or _current[key] | string != value | string %}
          {%     set ns.changed = true %}
          {%   endif %}
          {% endfor %}
          {{ ns.changed }}

    - name: Apply cluster settings
      ansible.builtin.uri:
        url: "{{ elasticsearch_http_protocol }}://{{ elasticsearch_api_host }}:{{ elasticstack_elasticsearch_http_port }}/_cluster/settings"
        method: PUT
        body_format: json
        body:
          persistent: "{{ _elasticsearch_effective_cluster_settings }}"
        user: "{{ 'elastic' if elasticsearch_security | bool else omit }}"
        password: "{{ elasticstack_password.stdout if elasticsearch_security | bool else omit }}"
        force_basic_auth: "{{ elasticsearch_security | bool }}"
        validate_certs: "{{ elasticsearch_validate_api_certs }}"
        status_code: 200
      no_log: "{{ elasticstack_no_log }}"
      when: _elasticsearch_cluster_settings_changed | bool
      changed_when: true
