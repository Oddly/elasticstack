---

- name: elasticsearch-keystore | Create keystore
  ansible.builtin.command: /usr/share/elasticsearch/bin/elasticsearch-keystore create
  args:
    creates: /etc/elasticsearch/elasticsearch.keystore

- name: elasticsearch-keystore | Check for bootstrap password
  ansible.builtin.command: /usr/share/elasticsearch/bin/elasticsearch-keystore list
  changed_when: false
  register: elasticsearch_keystore

- name: elasticsearch-keystore | Remove autoconfiguration password hash
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    remove autoconfiguration.password_hash
  when: "'autoconfiguration.password_hash' in elasticsearch_keystore.stdout_lines"
  changed_when: true
  notify:
    - Restart Elasticsearch

- name: elasticsearch-keystore | Get current bootstrap password
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    show bootstrap.password
  when: "'bootstrap.password' in elasticsearch_keystore.stdout_lines"
  register: elasticsearch_current_bootstrap_pw
  changed_when: false
  no_log: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: elasticsearch-keystore | Set bootstrap password
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    add -x -f 'bootstrap.password'
  args:
    stdin: "{{ elasticsearch_bootstrap_pw }}"
  changed_when: true
  no_log: true
  when: >-
    elasticsearch_current_bootstrap_pw.stdout is undefined or
    elasticsearch_current_bootstrap_pw.stdout != elasticsearch_bootstrap_pw
  notify:
    - Restart Elasticsearch
  ignore_errors: "{{ ansible_check_mode }}"

# --- HTTP SSL keystore/truststore passwords ---
# For auto-generated certs (P12): always set passwords from elasticsearch_tls_key_passphrase
# For external P12: set passwords from http passphrase variable
# For external PEM: skip entirely (no keystore needed)

- name: elasticsearch-keystore | Get xpack.security.http.ssl.keystore.secure_password
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    show xpack.security.http.ssl.keystore.secure_password
  when:
    - "'xpack.security.http.ssl.keystore.secure_password' in elasticsearch_keystore.stdout_lines"
    - elasticsearch_http_security
    - elasticsearch_cert_source == 'elasticsearch_ca' or (_elasticsearch_http_cert_format | default('')) == 'p12'
  register: elasticsearch_http_ssl_keystore_secure_password
  ignore_errors: "{{ ansible_check_mode }}"
  no_log: true
  changed_when: false

- name: elasticsearch-keystore | Set xpack.security.http.ssl.keystore.secure_password
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    add -f -x 'xpack.security.http.ssl.keystore.secure_password'
  args:
    stdin: >-
      {{ (elasticsearch_http_tls_key_passphrase | default(elasticsearch_transport_tls_key_passphrase, true))
         if elasticsearch_cert_source == 'external'
         else elasticsearch_tls_key_passphrase }}
  changed_when: true
  no_log: true
  when:
    - elasticsearch_http_security
    - elasticsearch_cert_source == 'elasticsearch_ca' or (_elasticsearch_http_cert_format | default('')) == 'p12'
    - >-
      elasticsearch_http_ssl_keystore_secure_password.stdout is undefined or
      ((elasticsearch_http_tls_key_passphrase | default(elasticsearch_transport_tls_key_passphrase, true))
       if elasticsearch_cert_source == 'external'
       else elasticsearch_tls_key_passphrase) != elasticsearch_http_ssl_keystore_secure_password.stdout
  notify:
    - Restart Elasticsearch

- name: elasticsearch-keystore | Remove xpack.security.http.ssl.keystore.secure_password
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    remove xpack.security.http.ssl.keystore.secure_password
  changed_when: true
  no_log: true
  when:
    - "'xpack.security.http.ssl.keystore.secure_password' in elasticsearch_keystore.stdout_lines"
    - not elasticsearch_http_security or (elasticsearch_cert_source == 'external' and (_elasticsearch_http_cert_format | default('')) == 'pem')
  notify:
    - Restart Elasticsearch

- name: elasticsearch-keystore | Get xpack.security.http.ssl.truststore.secure_password
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    show xpack.security.http.ssl.truststore.secure_password
  when:
    - "'xpack.security.http.ssl.truststore.secure_password' in elasticsearch_keystore.stdout_lines"
    - elasticsearch_http_security
    - elasticsearch_cert_source == 'elasticsearch_ca' or (_elasticsearch_http_cert_format | default('')) == 'p12'
  register: elasticsearch_http_ssl_truststore_secure_password
  ignore_errors: "{{ ansible_check_mode }}"
  no_log: true
  changed_when: false

- name: elasticsearch-keystore | Set xpack.security.http.ssl.truststore.secure_password
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    add -f -x 'xpack.security.http.ssl.truststore.secure_password'
  args:
    stdin: >-
      {{ (elasticsearch_http_tls_key_passphrase | default(elasticsearch_transport_tls_key_passphrase, true))
         if elasticsearch_cert_source == 'external'
         else elasticsearch_tls_key_passphrase }}
  changed_when: true
  no_log: true
  when:
    - elasticsearch_http_security
    - elasticsearch_cert_source == 'elasticsearch_ca' or (_elasticsearch_http_cert_format | default('')) == 'p12'
    - >-
      elasticsearch_http_ssl_truststore_secure_password.stdout is undefined or
      ((elasticsearch_http_tls_key_passphrase | default(elasticsearch_transport_tls_key_passphrase, true))
       if elasticsearch_cert_source == 'external'
       else elasticsearch_tls_key_passphrase) != elasticsearch_http_ssl_truststore_secure_password.stdout
  notify:
    - Restart Elasticsearch

- name: elasticsearch-keystore | Remove xpack.security.http.ssl.truststore.secure_password
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    remove xpack.security.http.ssl.truststore.secure_password
  changed_when: true
  no_log: true
  when:
    - "'xpack.security.http.ssl.truststore.secure_password' in elasticsearch_keystore.stdout_lines"
    - not elasticsearch_http_security or (elasticsearch_cert_source == 'external' and (_elasticsearch_http_cert_format | default('')) == 'pem')
  notify:
    - Restart Elasticsearch

