# --- PEM key passphrase in keystore for external PEM certs ---

- name: elasticsearch-keystore | Get xpack.security.transport.ssl.secure_key_passphrase
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    show xpack.security.transport.ssl.secure_key_passphrase
  when:
    - "'xpack.security.transport.ssl.secure_key_passphrase' in elasticsearch_keystore.stdout_lines"
    - elasticsearch_cert_source == 'external'
    - (_elasticsearch_transport_cert_format | default('')) == 'pem'
  register: elasticsearch_transport_ssl_secure_key_passphrase
  changed_when: false
  no_log: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: elasticsearch-keystore | Set xpack.security.transport.ssl.secure_key_passphrase
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    add -f -x 'xpack.security.transport.ssl.secure_key_passphrase'
  args:
    stdin: "{{ elasticsearch_transport_tls_key_passphrase }}"
  changed_when: true
  no_log: true
  when:
    - elasticsearch_cert_source == 'external'
    - (_elasticsearch_transport_cert_format | default('')) == 'pem'
    - elasticsearch_transport_tls_key_passphrase | length > 0
    - >-
      elasticsearch_transport_ssl_secure_key_passphrase.stdout is undefined or
      elasticsearch_transport_tls_key_passphrase != elasticsearch_transport_ssl_secure_key_passphrase.stdout
  notify:
    - Restart Elasticsearch

- name: elasticsearch-keystore | Get xpack.security.http.ssl.secure_key_passphrase
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    show xpack.security.http.ssl.secure_key_passphrase
  when:
    - "'xpack.security.http.ssl.secure_key_passphrase' in elasticsearch_keystore.stdout_lines"
    - elasticsearch_cert_source == 'external'
    - (_elasticsearch_http_cert_format | default('')) == 'pem'
    - elasticsearch_http_security
  register: elasticsearch_http_ssl_secure_key_passphrase
  changed_when: false
  no_log: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: elasticsearch-keystore | Set xpack.security.http.ssl.secure_key_passphrase
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-keystore
    add -f -x 'xpack.security.http.ssl.secure_key_passphrase'
  args:
    stdin: "{{ elasticsearch_http_tls_key_passphrase | default(elasticsearch_transport_tls_key_passphrase, true) }}"
  changed_when: true
  no_log: true
  when:
    - elasticsearch_cert_source == 'external'
    - (_elasticsearch_http_cert_format | default('')) == 'pem'
    - (elasticsearch_http_tls_key_passphrase | default(elasticsearch_transport_tls_key_passphrase, true)) | length > 0
    - elasticsearch_http_security
    - >-
      elasticsearch_http_ssl_secure_key_passphrase.stdout is undefined or
      (elasticsearch_http_tls_key_passphrase | default(elasticsearch_transport_tls_key_passphrase, true))
      != elasticsearch_http_ssl_secure_key_passphrase.stdout
  notify:
    - Restart Elasticsearch

# ============================================================
# Custom keystore entries (elasticsearch_keystore_entries)
# ============================================================
#
# These tasks run AFTER the built-in keystore management above.
# The role owns a fixed set of keystore keys (SSL passwords,
# bootstrap password, etc.) — those are off-limits. User-provided
# entries in elasticsearch_keystore_entries must not overlap with
# them or the playbook fails with a clear error explaining why.
#
# Stale entries (present in the keystore but absent from
# elasticsearch_keystore_entries and not role-managed) are removed
# to keep the keystore in sync with declared state.

- name: elasticsearch-keystore | Manage custom entries
  when: elasticsearch_keystore_entries | length > 0
  vars:
    _elasticsearch_reserved_keystore_keys:
      - bootstrap.password
      - autoconfiguration.password_hash
      - keystore.seed
      - xpack.security.http.ssl.keystore.secure_password
      - xpack.security.http.ssl.truststore.secure_password
      - xpack.security.transport.ssl.keystore.secure_password
      - xpack.security.transport.ssl.truststore.secure_password
      - xpack.security.http.ssl.secure_key_passphrase
      - xpack.security.transport.ssl.secure_key_passphrase
  block:
    - name: elasticsearch-keystore | Validate custom entries do not conflict with role-managed keys
      ansible.builtin.assert:
        that:
          - item.key not in _elasticsearch_reserved_keystore_keys
        fail_msg: >-
          Cannot set '{{ item.key }}' via elasticsearch_keystore_entries because
          this key is managed automatically by the elasticsearch role. Remove it
          from elasticsearch_keystore_entries. The role manages these keys
          internally: {{ _elasticsearch_reserved_keystore_keys | join(', ') }}
      loop: "{{ elasticsearch_keystore_entries | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: elasticsearch-keystore | Get current value for custom entry '{{ item.key }}'
      ansible.builtin.command: >
        /usr/share/elasticsearch/bin/elasticsearch-keystore
        show {{ item.key }}
      loop: "{{ elasticsearch_keystore_entries | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: _elasticsearch_custom_keystore_current
      changed_when: false
      no_log: true
      # Only expect failure when the key doesn't exist yet. If the key IS
      # listed in the keystore but show still fails, that's a real error
      # (corrupt keystore, permission denied) — let it propagate.
      failed_when: >-
        _elasticsearch_custom_keystore_current.rc != 0 and
        item.key in elasticsearch_keystore.stdout_lines

    - name: elasticsearch-keystore | Set custom entry '{{ item.item.key }}'
      ansible.builtin.command: >
        /usr/share/elasticsearch/bin/elasticsearch-keystore
        add -f -x '{{ item.item.key }}'
      args:
        stdin: "{{ item.item.value }}"
      loop: "{{ _elasticsearch_custom_keystore_current.results | default([]) }}"
      loop_control:
        label: "{{ item.item.key }}"
      changed_when: true
      no_log: true
      when: item.rc != 0 or item.stdout != item.item.value | string
      notify:
        - Restart Elasticsearch

    # --- Remove stale custom keystore entries ---
    #
    # Re-list the keystore, then subtract: declared custom entries,
    # all role-managed keys. Whatever remains is stale and gets removed.

    - name: elasticsearch-keystore | Refresh keystore listing
      ansible.builtin.command: /usr/share/elasticsearch/bin/elasticsearch-keystore list
      changed_when: false
      register: _elasticsearch_keystore_after_custom

    - name: elasticsearch-keystore | Remove stale custom entries
      ansible.builtin.command: >
        /usr/share/elasticsearch/bin/elasticsearch-keystore
        remove {{ item }}
      loop: >-
        {{ _elasticsearch_keystore_after_custom.stdout_lines
           | difference(elasticsearch_keystore_entries.keys() | list)
           | difference(_elasticsearch_reserved_keystore_keys) }}
      loop_control:
        label: "{{ item }}"
      changed_when: true
      notify:
        - Restart Elasticsearch

# ============================================================

- name: elasticsearch-keystore | Check keystore exists
  ansible.builtin.stat:
    path: /etc/elasticsearch/elasticsearch.keystore
  register: _elasticsearch_keystore_file

- name: elasticsearch-keystore | Ensure keystore permissions
  ansible.builtin.file:
    path: /etc/elasticsearch/elasticsearch.keystore
    owner: root
    group: elasticsearch
    mode: "0660"
  when: _elasticsearch_keystore_file.stat.exists
