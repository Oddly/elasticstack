---
# Check a deployed certificate's expiry and emit a context-aware warning.
#
# Required variables:
#   _warn_cert_path       Path to certificate on the managed node
#   _warn_buffer_days     Days threshold for warning
#   _warn_service_name    Display name (e.g. "Elasticsearch transport")
#
# Optional variables:
#   _warn_cert_pass       Passphrase (omit for PEM without passphrase)
#   _warn_cert_format     'pem' or 'p12' (default: 'p12')
#   _warn_cert_source     'elasticsearch_ca' or 'external' (default: 'elasticsearch_ca')

- name: certs | cert_expiry_warn | Check certificate file exists — {{ _warn_service_name }}
  ansible.builtin.stat:
    path: "{{ _warn_cert_path }}"
  register: _elasticstack_warn_cert_file

- name: certs | cert_expiry_warn | Check certificate expiry — {{ _warn_service_name }}
  when: _elasticstack_warn_cert_file.stat.exists
  block:
    - name: certs | cert_expiry_warn | Read certificate info — {{ _warn_service_name }}
      oddly.elasticstack.cert_info:
        path: "{{ _warn_cert_path }}"
        passphrase: "{{ _warn_cert_pass | default(omit, true) }}"
        format: "{{ _warn_cert_format | default('p12') }}"
      register: _elasticstack_warn_cert_result
      ignore_errors: true  # noqa: ignore-errors

    - name: certs | cert_expiry_warn | Calculate days until certificate expires — {{ _warn_service_name }}
      ansible.builtin.set_fact:
        _elasticstack_warn_days_remaining: >-
          {{ ((((_elasticstack_warn_cert_result.not_valid_after | regex_replace('[+-]\d{2}:\d{2}$', ''))
          | to_datetime('%Y-%m-%d %H:%M:%S')) - (ansible_facts.date_time.date
          | to_datetime('%Y-%m-%d'))).days) }}
      when: _elasticstack_warn_cert_result is succeeded

    - name: certs | cert_expiry_warn | Certificate expires soon — {{ _warn_service_name }}
      ansible.builtin.debug:
        msg: >-
          Certificate {{ _warn_cert_path }} on {{ inventory_hostname }}
          expires in {{ _elasticstack_warn_days_remaining }} days.
          {% if (_warn_cert_source | default('elasticsearch_ca')) == 'external' %}
          Replace the certificate files and re-run the playbook.
          {% else %}
          Run with --tags renew_{{ _warn_service_name | lower | replace(' ', '_') }}_cert to renew.
          {% endif %}
      when:
        - _elasticstack_warn_cert_result is succeeded
        - _elasticstack_warn_days_remaining | int <= _warn_buffer_days | int
      changed_when: true
