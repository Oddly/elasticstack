---
- name: Bootstrap python3-apt for Ansible apt module
  ansible.builtin.raw: apt-get install -y python3-apt
  changed_when: false
  when:
    - ansible_facts.os_family == 'Debian'
    - ansible_facts.pkg_mgr == 'apt'

- name: Update apt cache.
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 600
  changed_when: false
  when: ansible_facts.os_family == 'Debian'

- name: Install packages for security tasks
  ansible.builtin.package:
    name:
      - unzip
      - python3-cryptography
      - python3-packaging
      - openssl
  tags:
    - certificates
    - renew_ca
    - renew_kibana_cert
    - renew_beats_cert
    - renew_es_cert
    - renew_logstash_cert
