---
- name: Bootstrap python3-apt for Ansible apt module
  ansible.builtin.raw: apt-get install -y python3-apt
  changed_when: false
  when:
    - ansible_facts.os_family == 'Debian'
    - ansible_facts.pkg_mgr == 'apt'

- name: Update apt cache.
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 600
  changed_when: false
  when: ansible_facts.os_family == 'Debian'

- name: Install packages for security tasks
  ansible.builtin.package:
    name:
      - unzip
      - python3-cryptography
      - python3-packaging
      - openssl
  tags:
    - certificates
    - renew_ca
    - renew_kibana_cert
    - renew_beats_cert
    - renew_es_cert
    - renew_logstash_cert

# We don't know how the user made `pip` available and we don't want
# to mess with the installation.
# But we need a way to install our dependencies

- name: Install packages for module dependencies
  ansible.builtin.package:
    name:
      - python3-pip
  when:
    - elasticstack_manage_pip | bool

# The following block will try to install modules via pip
# If that fails it will try to install them via package manager
# Packets are sometimes too old as a dependency, so pip is
# preferred
# If that's the case the next task will allow breaking
# systems Python and just install it via pip no matter what

- name: Install Python Modules as dependencies
  when:
    - elasticstack_install_python_client | bool
    - not elasticstack_force_pip | bool
  block:
    - name: Install Python Modules via pip
      ansible.builtin.pip:
        name:
          - 'elasticsearch>={{ elasticstack_release }},<{{ elasticstack_release | int + 1 }}'
          - cryptography
      environment:
        PIP_BREAK_SYSTEM_PACKAGES: "1"
      ignore_errors: true
      register: elasticstack_pip_installation

    - name: Install elasticsearch Python module via package manager
      ansible.builtin.package:
        name:
          - python3-elasticsearch
          - python3-cryptography
      when:
        - elasticstack_pip_installation is failed

    - name: Check elasticsearch-py version from package manager
      ansible.builtin.command: python3 -c "import elasticsearch; print(elasticsearch.__version__)"
      changed_when: false
      register: elasticstack_es_py_version_check
      when:
        - elasticstack_pip_installation is failed

    - name: Fail if elasticsearch-py is too old
      ansible.builtin.fail:
        msg: >-
          The system package python3-elasticsearch provides version {{ elasticstack_es_py_version_check.stdout }},
          but this collection requires elasticsearch-py >= 8.0.
          Either install python3-pip and set elasticstack_manage_pip: true,
          or run: pip install 'elasticsearch>={{ elasticstack_release }},<{{ elasticstack_release | int + 1 }}'
      when:
        - elasticstack_pip_installation is failed
        - elasticstack_es_py_version_check.stdout is defined
        - elasticstack_es_py_version_check.stdout is version('8.0.0', '<')

- name: Install Python Modules via pip  - forced
  ansible.builtin.pip:
    name:
      - 'elasticsearch>={{ elasticstack_release }},<{{ elasticstack_release | int + 1 }}'
      - cryptography
  environment:
    PIP_BREAK_SYSTEM_PACKAGES: "1"
  ignore_errors: true
  when:
    - elasticstack_install_python_client | bool
    - elasticstack_force_pip | bool
  register: elasticstack_pip_installation_forced
