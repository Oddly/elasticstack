---
# @meta description: >
# Shared defaults for the oddly.elasticstack collection. These variables
# are used across all roles (elasticsearch, kibana, logstash, beats, repos)
# to provide consistent configuration for inventory group names, ports,
# TLS certificate authority settings, and repository configuration.
# @end

# === Inventory Group Names ===

# @var elasticstack_elasticsearch_group_name:description: Ansible inventory group name containing Elasticsearch hosts
elasticstack_elasticsearch_group_name: elasticsearch
# @var elasticstack_logstash_group_name:description: Ansible inventory group name containing Logstash hosts
elasticstack_logstash_group_name: logstash
# @var elasticstack_kibana_group_name:description: Ansible inventory group name containing Kibana hosts
elasticstack_kibana_group_name: kibana

# === Network Ports ===

# @var elasticstack_beats_port:description: Port used for Beats-to-Logstash communication
elasticstack_beats_port: 5044
# @var elasticstack_elasticsearch_http_port:description: Elasticsearch HTTP API port
elasticstack_elasticsearch_http_port: 9200
# @var elasticstack_kibana_port:description: Kibana web interface port
elasticstack_kibana_port: 5601

# === Certificate Authority ===

# @var elasticstack_ca_host:description: Host that runs the Elasticsearch certificate authority. Defaults to the first host in the elasticsearch group
elasticstack_ca_host: "{{ (groups[elasticstack_elasticsearch_group_name] | default([inventory_hostname]))[0] }}"
# @var elasticstack_ca_dir:description: Directory where the CA certificate and key are stored
elasticstack_ca_dir: /opt/es-ca
# @var elasticstack_ca_expiration_buffer:description: Days before CA certificate expiry to trigger renewal
elasticstack_ca_expiration_buffer: 30
# @var elasticstack_ca_name:description: Subject name for the generated CA certificate
elasticstack_ca_name: "CN=Elastic Certificate Tool Autogenerated CA"
# @var elasticstack_ca_pass:description: Passphrase for the CA private key
elasticstack_ca_pass: PleaseChangeMe
# @var elasticstack_cert_pass:description: >
#   Common passphrase applied to all role TLS private keys when set.
#   Overrides elasticsearch_tls_key_passphrase, kibana_tls_key_passphrase,
#   logstash_tls_key_passphrase, and beats_tls_key_passphrase.
#   Leave empty to use the per-role passphrases.
# @end
# elasticstack_cert_pass:
# @var elasticstack_ca_validity_period:description: Validity period in days for the CA certificate
elasticstack_ca_validity_period: 1095
# === General Settings ===

# @var elasticstack_enable_repos:description: Let the repos role manage Elastic APT/YUM repositories
elasticstack_enable_repos: true
# @var elasticstack_full_stack:description: Running a full Elastic Stack deployment. Enables auto-discovery of hosts from inventory groups and cross-role TLS setup
elasticstack_full_stack: true
# @var elasticstack_initial_passwords:description: Path to the file containing initial Elasticsearch passwords generated during security setup
elasticstack_initial_passwords: /usr/share/elasticsearch/initial_passwords
# @var elasticstack_override_beats_tls:description: Force Beats to use TLS certificates from the Elasticsearch CA instead of its own
elasticstack_override_beats_tls: false
# @var elasticstack_release:description: Major version of the Elastic Stack to install (8 or 9)
elasticstack_release: 8
# @var elasticstack_repo_base_url:description: Base URL for Elastic package repositories. Override to use a local mirror or cache
# @var elasticstack_repo_base_url:example: >
# elasticstack_repo_base_url: "https://my-mirror.example.com/elastic"
# @end
elasticstack_repo_base_url: "{{ lookup('env', 'ELASTICSTACK_REPO_BASE_URL') | default('https://artifacts.elastic.co', true) }}"
# @var elasticstack_repo_key:description: URL to the GPG key used to verify Elastic packages
elasticstack_repo_key: "{{ elasticstack_repo_base_url }}/GPG-KEY-elasticsearch"
# @var elasticstack_rpm_workaround:description: Apply workaround for RPM package installation issues on certain RHEL versions
elasticstack_rpm_workaround: false
# @var elasticstack_security:description: Enable security features across the entire stack (TLS, authentication, RBAC)
elasticstack_security: true

# === Debugging ===

# @var elasticstack_no_log:description: Suppress sensitive output in Ansible logs. Set to false for debugging
elasticstack_no_log: true
