---

# ============================================================
# External certificates
# ============================================================

- name: beats-security | Handle external certificates
  when: beats_cert_source == 'external'
  block:

    # -- Detect content mode vs file mode --
    - name: beats-security | Detect content mode for Beats
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/certs/cert_detect_content_mode.yml"
      vars:
        _detect_cert_content_var: "{{ beats_tls_certificate_content | default('', true) }}"
        _detect_key_content_var: "{{ beats_tls_key_content | default('', true) }}"
        _detect_cert_file_var: "{{ beats_tls_certificate_file }}"
        _detect_service_name: Beats
        _detect_key_var_name: beats_tls_key_content

    - name: beats-security | Map detection results to Beats facts
      ansible.builtin.set_fact:
        _beats_content_mode: "{{ _detect_content_mode }}"
        _beats_cert_format: "{{ _detect_cert_format | default(omit) }}"
        _beats_ca_extracted: "{{ _detect_ca_extracted | default(false) }}"

    # -- File mode: validate and detect format --
    - name: beats-security | Validate Beats certificate (file mode)
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/certs/cert_validate.yml"
      vars:
        _validate_cert_path: "{{ beats_tls_certificate_file }}"
        _validate_key_path: "{{ beats_tls_key_file }}"
        _validate_pass: ""
        _validate_remote_src: "{{ beats_tls_remote_src }}"
        _validate_service: "Beats"
        _validate_format_fact: _beats_cert_format
        _validate_key_fact: _beats_resolved_key
        _validate_ca_extracted_fact: _beats_ca_extracted
      when: not (_beats_content_mode | bool)

    # -- Deploy certificates --

    - name: beats-security | Create certificate directory
      ansible.builtin.file:
        path: /etc/beats/certs
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: beats-security | Write Beats certificate (from content)
      ansible.builtin.copy:
        content: "{{ beats_tls_certificate_content }}"
        dest: "/etc/beats/certs/{{ inventory_hostname }}-beats.crt"
        owner: root
        group: root
        mode: "0640"
      when: _beats_content_mode | bool
      notify:
        - Restart Filebeat
        - Restart Auditbeat
        - Restart Metricbeat

    - name: beats-security | Copy Beats certificate (from file)
      ansible.builtin.copy:
        src: "{{ beats_tls_certificate_file }}"
        dest: "/etc/beats/certs/{{ inventory_hostname }}-beats.crt"
        owner: root
        group: root
        mode: "0640"
        remote_src: "{{ beats_tls_remote_src }}"
      when: not (_beats_content_mode | bool)
      notify:
        - Restart Filebeat
        - Restart Auditbeat
        - Restart Metricbeat

    - name: beats-security | Write Beats key (from content)
      ansible.builtin.copy:
        content: "{{ beats_tls_key_content }}"
        dest: "/etc/beats/certs/{{ inventory_hostname }}-beats.key"
        owner: root
        group: root
        mode: "0640"
      when: _beats_content_mode | bool
      notify:
        - Restart Filebeat
        - Restart Auditbeat
        - Restart Metricbeat

    - name: beats-security | Copy Beats key (from file)
      ansible.builtin.copy:
        src: "{{ _beats_resolved_key }}"
        dest: "/etc/beats/certs/{{ inventory_hostname }}-beats.key"
        owner: root
        group: root
        mode: "0640"
        remote_src: "{{ beats_tls_remote_src }}"
      when:
        - not (_beats_content_mode | bool)
        - _beats_resolved_key | length > 0
      notify:
        - Restart Filebeat
        - Restart Auditbeat
        - Restart Metricbeat

    # -- CA certificate --

    - name: beats-security | Write CA certificate (from content)
      ansible.builtin.copy:
        content: "{{ beats_tls_ca_content }}"
        dest: /etc/beats/certs/ca.crt
        owner: root
        group: root
        mode: "0640"
      when: beats_tls_ca_content | default('', true) | length > 0
      notify:
        - Restart Filebeat
        - Restart Auditbeat
        - Restart Metricbeat

    - name: beats-security | Copy CA certificate (from file)
      ansible.builtin.copy:
        src: "{{ beats_tls_ca_file }}"
        dest: /etc/beats/certs/ca.crt
        owner: root
        group: root
        mode: "0640"
        remote_src: "{{ beats_tls_remote_src }}"
      when:
        - beats_tls_ca_content | default('', true) | length == 0
        - beats_tls_ca_file | length > 0
      notify:
        - Restart Filebeat
        - Restart Auditbeat
        - Restart Metricbeat

    # Extract CA chain from the already-deployed cert on the node
    - name: beats-security | Read CA chain from PEM bundle
      ansible.builtin.shell:
        cmd: >-
          awk '/-----BEGIN CERTIFICATE-----/{n++} n>1'
          /etc/beats/certs/{{ inventory_hostname }}-beats.crt
      register: _beats_extracted_ca_chain
      changed_when: false
      when:
        - beats_tls_ca_file | length == 0
        - beats_tls_ca_content | default('', true) | length == 0
        - _beats_ca_extracted | bool

    - name: beats-security | Write extracted CA chain
      ansible.builtin.copy:
        content: "{{ _beats_extracted_ca_chain.stdout }}\n"
        dest: /etc/beats/certs/ca.crt
        owner: root
        group: root
        mode: "0640"
      when:
        - beats_tls_ca_file | length == 0
        - beats_tls_ca_content | default('', true) | length == 0
        - _beats_ca_extracted | bool
      notify:
        - Restart Filebeat
        - Restart Auditbeat
        - Restart Metricbeat

# ============================================================
# Auto-generated certificates (elasticsearch_ca)
# ============================================================

- name: beats-security | Handle auto-generated certificates
  when: beats_cert_source == 'elasticsearch_ca'
  block:
    # -- Check Beats certificate expiry (PEM format) --
    - name: beats-security | Check Beats certificate expiry
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/certs/cert_check_expiry.yml"
        apply:
          tags:
            - certificates
            - renew_beats_cert
      vars:
        _cert_path: "/etc/beats/certs/{{ inventory_hostname }}-beats.crt"
        _cert_format: pem
        _cert_buffer_days: "{{ beats_cert_expiration_buffer }}"
        _cert_expiry_fact: beats_cert_will_expire_soon
      tags:
        - certificates
        - renew_beats_cert

    # -- Backup Beats certs on node --
    - name: beats-security | Backup Beats certs on node
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/certs/cert_backup.yml"
        apply:
          tags:
            - renew_ca
            - renew_beats_cert
      vars:
        _backup_path: /etc/beats/certs
        _backup_target: "{{ inventory_hostname }}"
      when: "'renew_beats_cert' in ansible_run_tags or 'renew_ca' in ansible_run_tags or beats_cert_will_expire_soon | bool"
      tags:
        - renew_ca
        - renew_beats_cert

    # -- Backup Beats cert on CA host --
    - name: beats-security | Backup Beats cert on CA host
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/certs/cert_backup.yml"
        apply:
          tags:
            - renew_ca
            - renew_beats_cert
      vars:
        _backup_path: "{{ elasticstack_ca_dir }}/{{ ansible_facts.hostname }}-beats.zip"
        _backup_target: "{{ elasticstack_ca_host }}"
      when: "'renew_beats_cert' in ansible_run_tags or 'renew_ca' in ansible_run_tags or beats_cert_will_expire_soon | bool"
      tags:
        - renew_ca
        - renew_beats_cert

    # -- Backup Beats cert on Ansible controller --
    - name: beats-security | Backup Beats cert on Ansible controller
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/certs/cert_backup.yml"
        apply:
          tags:
            - renew_ca
            - renew_beats_cert
      vars:
        _backup_path: "{{ lookup('config', 'DEFAULT_LOCAL_TMP') | dirname }}/certs/{{ inventory_hostname }}/{{ ansible_facts.hostname }}-beats.zip"
        _backup_target: localhost
        _backup_become: false
      when: "'renew_beats_cert' in ansible_run_tags or 'renew_ca' in ansible_run_tags or beats_cert_will_expire_soon | bool"
      tags:
        - renew_ca
        - renew_beats_cert

    # -- Create Beats certificate directory (Beats-specific path/perms) --
    - name: beats-security | Create certificate directory
      ansible.builtin.file:
        path: /etc/beats/certs
        state: directory
        owner: root
        group: root
        mode: "0700"
      tags:
        - certificates
        - renew_ca
        - renew_beats_cert

    # -- Generate PEM certificate for Beats --
    - name: beats-security | Generate Beats certificate
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/certs/cert_generate.yml"
        apply:
          tags:
            - certificates
            - renew_ca
            - renew_beats_cert
      vars:
        _cert_name: "{{ ansible_facts.hostname }}"
        _cert_ip: "{{ ansible_facts.default_ipv4.address | default(ansible_facts.all_ipv4_addresses[0]) }}"
        _cert_dns: "{{ ansible_facts.hostname }},{{ ansible_facts.fqdn }},{{ inventory_hostname }}"
        _cert_out: "{{ elasticstack_ca_dir }}/{{ ansible_facts.hostname }}-beats.zip"
        _cert_pass: "{{ beats_tls_key_passphrase }}"
        _cert_validity: "{{ beats_cert_validity_period }}"
        _cert_format: pem
      tags:
        - certificates
        - renew_ca
        - renew_beats_cert

    # -- Distribute PEM cert (zip) to Beats node (kept inline, zip requires unarchive) --
    - name: beats-security | Fetch certificate zip from CA host to controller
      ansible.builtin.fetch:
        src: "{{ elasticstack_ca_dir }}/{{ ansible_facts.hostname }}-beats.zip"
        dest: "{{ lookup('config', 'DEFAULT_LOCAL_TMP') | dirname }}/certs/{{ inventory_hostname }}/{{ ansible_facts.hostname }}-beats.zip"
        flat: true
      delegate_to: "{{ elasticstack_ca_host }}"
      tags:
        - certificates
        - renew_ca
        - renew_beats_cert

    - name: beats-security | Extract certificate on Beats node
      ansible.builtin.unarchive:
        src: "{{ lookup('config', 'DEFAULT_LOCAL_TMP') | dirname }}/certs/{{ inventory_hostname }}/{{ ansible_facts.hostname }}-beats.zip"
        dest: "/etc/beats/certs/"
        owner: root
        group: root
        mode: "0640"
      tags:
        - certificates
        - renew_ca
        - renew_beats_cert

    - name: beats-security | Copy certificate to standard location
      ansible.builtin.copy:
        src: "/etc/beats/certs/{{ ansible_facts.hostname }}/{{ ansible_facts.hostname }}.crt"
        dest: "/etc/beats/certs/{{ inventory_hostname }}-beats.crt"
        owner: root
        group: root
        mode: "0640"
        remote_src: true
      notify:
        - Restart Filebeat
        - Restart Auditbeat
        - Restart Metricbeat
      tags:
        - certificates
        - renew_ca
        - renew_beats_cert

    - name: beats-security | Copy key to standard location
      ansible.builtin.copy:
        src: "/etc/beats/certs/{{ ansible_facts.hostname }}/{{ ansible_facts.hostname }}.key"
        dest: "/etc/beats/certs/{{ inventory_hostname }}-beats.key"
        owner: root
        group: root
        mode: "0640"
        remote_src: true
      notify:
        - Restart Filebeat
        - Restart Auditbeat
        - Restart Metricbeat
      tags:
        - certificates
        - renew_ca
        - renew_beats_cert

    # -- Distribute CA certificate to Beats nodes --
    - name: beats-security | Distribute CA certificate to Beats nodes
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/certs/cert_distribute.yml"
        apply:
          tags:
            - certificates
            - renew_ca
            - renew_beats_cert
      vars:
        _cert_src: "{{ elasticstack_ca_dir }}/ca.crt"
        _cert_dest: /etc/beats/certs/ca.crt
        _cert_owner: root
        _cert_group: root
        _cert_mode: "0640"
        _cert_notify:
          - Restart Filebeat
          - Restart Auditbeat
          - Restart Metricbeat
      tags:
        - certificates
        - renew_ca
        - renew_beats_cert

# ============================================================
# Shared tasks (both cert sources)
# ============================================================

# -- Fetch Beats password --
- name: beats-security | Fetch Beats password
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/../elasticstack/tasks/fetch_password.yml"
  vars:
    _password_user: elastic
    _password_fact: beats_writer_password

# -- Certificate expiry warning --
- name: beats-security | Check Beats certificate expiry warning
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/../elasticstack/tasks/certs/cert_expiry_warn.yml"
  vars:
    _warn_cert_path: "/etc/beats/certs/{{ inventory_hostname }}-beats.crt"
    _warn_cert_format: pem
    _warn_buffer_days: "{{ beats_cert_expiration_buffer }}"
    _warn_service_name: "Beats"
    _warn_cert_source: "{{ beats_cert_source }}"
