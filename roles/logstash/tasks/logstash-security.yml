---
- name: logstash-security | Determine certificate management mode
  ansible.builtin.set_fact:
    _logstash_cert_mode: "{{ logstash_cert_source | default('elasticsearch_ca') }}"

- name: logstash-security | Handle external certificates
  when: _logstash_cert_mode == 'external'
  block:
    - name: logstash-security | Validate external certificate paths are provided
      ansible.builtin.assert:
        that:
          - logstash_tls_certificate_file is defined
          - logstash_tls_key_file is defined
        fail_msg: "External cert mode requires logstash_tls_certificate_file and logstash_tls_key_file"

    - name: logstash-security | Create certificate directory
      ansible.builtin.file:
        state: directory
        path: "{{ logstash_certs_dir }}"
        owner: root
        group: logstash
        mode: "0750"

    - name: logstash-security | Copy external certificate
      ansible.builtin.copy:
        src: "{{ logstash_tls_certificate_file }}"
        dest: "{{ logstash_certs_dir }}/{{ inventory_hostname }}-server.crt"
        owner: root
        group: logstash
        mode: "0640"
        remote_src: "{{ logstash_tls_remote_src | default(false) }}"
      notify:
        - Restart Logstash

    - name: logstash-security | Copy external key
      ansible.builtin.copy:
        src: "{{ logstash_tls_key_file }}"
        dest: "{{ logstash_certs_dir }}/{{ inventory_hostname }}-pkcs8.key"
        owner: root
        group: logstash
        mode: "0640"
        remote_src: "{{ logstash_tls_remote_src | default(false) }}"
      notify:
        - Restart Logstash

    - name: logstash-security | Copy external CA certificate
      ansible.builtin.copy:
        src: "{{ logstash_tls_ca_file }}"
        dest: "{{ logstash_certs_dir }}/ca.crt"
        owner: root
        group: logstash
        mode: "0640"
        remote_src: "{{ logstash_tls_remote_src | default(false) }}"
      when: logstash_tls_ca_file is defined
      notify:
        - Restart Logstash

- name: logstash-security | Handle Elasticsearch CA certificates
  when: _logstash_cert_mode == 'elasticsearch_ca'
  block:
    # -- Check Logstash certificate expiry --
    - name: logstash-security | Check Logstash certificate expiry
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/certs/cert_check_expiry.yml"
        apply:
          tags:
            - certificates
      vars:
        _cert_path: "{{ logstash_certs_dir }}/{{ ansible_facts.hostname }}-ls.p12"
        _cert_pass: "{{ logstash_tls_key_passphrase }}"
        _cert_buffer_days: "{{ logstash_cert_expiration_buffer }}"
        _cert_expiry_fact: logstash_cert_will_expire_soon
      tags:
        - certificates

    # -- Determine if renewal is needed (Logstash-specific combined logic) --
    - name: logstash-security | Determine if certificate renewal is needed
      ansible.builtin.set_fact:
        _logstash_needs_cert_renewal: >-
          {{ (not (elasticstack_cert_stat.stat.exists | default(false))) or
             (logstash_cert_force_regenerate | default(false) | bool) or
             (logstash_cert_will_expire_soon | default(false) | bool) }}

    # -- Backup and remove existing certificates --
    - name: logstash-security | Backup Logstash cert directory
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/certs/cert_backup.yml"
      vars:
        _backup_path: "{{ logstash_certs_dir }}"
        _backup_target: "{{ inventory_hostname }}"
      when:
        - _logstash_needs_cert_renewal | bool
        - elasticstack_cert_stat.stat.exists | default(false)

    - name: logstash-security | Remove old certificate on CA host
      ansible.builtin.file:
        path: "{{ elasticstack_ca_dir }}/{{ ansible_facts.hostname }}-ls.p12"
        state: absent
      delegate_to: "{{ elasticstack_ca_host }}"
      when:
        - _logstash_needs_cert_renewal | bool
        - elasticstack_cert_stat.stat.exists | default(false)

    - name: logstash-security | Remove old PEM certificate zip on CA host
      ansible.builtin.file:
        path: "{{ elasticstack_ca_dir }}/{{ ansible_facts.hostname }}-ls.zip"
        state: absent
      delegate_to: "{{ elasticstack_ca_host }}"
      when:
        - _logstash_needs_cert_renewal | bool
        - elasticstack_cert_stat.stat.exists | default(false)

    # -- Generate and distribute certificates --
    - name: logstash-security | Generate and distribute certificates
      when: _logstash_needs_cert_renewal | bool
      block:
        - name: logstash-security | Create certificate directory
          ansible.builtin.file:
            state: directory
            path: "{{ logstash_certs_dir }}"
            owner: root
            group: logstash
            mode: "0750"
          tags:
            - certificates

        # -- P12 certificate --
        - name: logstash-security | Generate P12 certificate for Logstash
          ansible.builtin.include_tasks:
            file: "{{ role_path }}/../elasticstack/tasks/certs/cert_generate.yml"
            apply:
              tags:
                - certificates
          vars:
            _cert_name: "{{ ansible_facts.hostname }}"
            _cert_ip: "{{ ansible_facts.default_ipv4.address | default(ansible_facts.all_ipv4_addresses[0]) }}"
            _cert_dns: "{{ ansible_facts.hostname }},{{ ansible_facts.fqdn }},{{ inventory_hostname }}"
            _cert_out: "{{ elasticstack_ca_dir }}/{{ ansible_facts.hostname }}-ls.p12"
            _cert_pass: "{{ logstash_tls_key_passphrase }}"
            _cert_validity: "{{ logstash_cert_validity_period }}"
          tags:
            - certificates

        - name: logstash-security | Distribute P12 certificate to Logstash host
          ansible.builtin.include_tasks:
            file: "{{ role_path }}/../elasticstack/tasks/certs/cert_distribute.yml"
            apply:
              tags:
                - certificates
          vars:
            _cert_src: "{{ elasticstack_ca_dir }}/{{ ansible_facts.hostname }}-ls.p12"
            _cert_dest: "{{ logstash_certs_dir }}/{{ ansible_facts.hostname }}-ls.p12"
            _cert_owner: root
            _cert_group: logstash
            _cert_mode: "0640"
          tags:
            - certificates

        - name: logstash-security | Copy P12 as keystore
          ansible.builtin.copy:
            src: "{{ lookup('config', 'DEFAULT_LOCAL_TMP') | dirname }}/certs/{{ inventory_hostname }}/{{ ansible_facts.hostname }}-ls.p12"
            dest: "{{ logstash_certs_dir }}/keystore.pfx"
            owner: root
            group: logstash
            mode: "0640"
          notify:
            - Restart Logstash
          tags:
            - certificates

        # -- PEM certificate (kept inline, zip+PKCS8 flow is Logstash-specific) --
        - name: logstash-security | Generate PEM certificate for Logstash
          ansible.builtin.include_tasks:
            file: "{{ role_path }}/../elasticstack/tasks/certs/cert_generate.yml"
            apply:
              tags:
                - certificates
          vars:
            _cert_name: "{{ ansible_facts.hostname }}"
            _cert_ip: "{{ ansible_facts.default_ipv4.address | default(ansible_facts.all_ipv4_addresses[0]) }}"
            _cert_dns: "{{ ansible_facts.hostname }},{{ ansible_facts.fqdn }},{{ inventory_hostname }}"
            _cert_out: "{{ elasticstack_ca_dir }}/{{ ansible_facts.hostname }}-ls.zip"
            _cert_pass: "{{ logstash_tls_key_passphrase }}"
            _cert_validity: "{{ logstash_cert_validity_period }}"
            _cert_format: pem
          tags:
            - certificates

        - name: logstash-security | Fetch PEM certificate zip to controller
          ansible.builtin.fetch:
            src: "{{ elasticstack_ca_dir }}/{{ ansible_facts.hostname }}-ls.zip"
            dest: "{{ lookup('config', 'DEFAULT_LOCAL_TMP') | dirname }}/certs/{{ inventory_hostname }}/{{ ansible_facts.hostname }}-ls.zip"
            flat: true
          delegate_to: "{{ elasticstack_ca_host }}"
          tags:
            - certificates

        - name: logstash-security | Extract PEM certificate on Logstash host
          ansible.builtin.unarchive:
            src: "{{ lookup('config', 'DEFAULT_LOCAL_TMP') | dirname }}/certs/{{ inventory_hostname }}/{{ ansible_facts.hostname }}-ls.zip"
            dest: "{{ logstash_certs_dir }}/"
            owner: root
            group: logstash
            mode: "0640"
          tags:
            - certificates

        - name: logstash-security | Copy server certificate to standard location
          ansible.builtin.copy:
            src: "{{ logstash_certs_dir }}/{{ ansible_facts.hostname }}/{{ ansible_facts.hostname }}.crt"
            dest: "{{ logstash_certs_dir }}/{{ inventory_hostname }}-server.crt"
            owner: root
            group: logstash
            mode: "0640"
            remote_src: true
          tags:
            - certificates

        - name: logstash-security | Copy encrypted key
          ansible.builtin.copy:
            src: "{{ logstash_certs_dir }}/{{ ansible_facts.hostname }}/{{ ansible_facts.hostname }}.key"
            dest: "{{ logstash_certs_dir }}/{{ inventory_hostname }}.key"
            owner: root
            group: root
            mode: "0640"
            remote_src: true
          tags:
            - certificates

        - name: logstash-security | Create unencrypted PKCS8 key for Logstash
          ansible.builtin.command: >
            openssl pkcs8
            -in {{ logstash_certs_dir }}/{{ inventory_hostname }}.key
            -topk8
            -passin pass:{{ logstash_tls_key_passphrase }}
            -out {{ logstash_certs_dir }}/{{ inventory_hostname }}-pkcs8.key
            -nocrypt
          args:
            creates: "{{ logstash_certs_dir }}/{{ inventory_hostname }}-pkcs8.key"
          no_log: "{{ elasticstack_no_log }}"
          tags:
            - certificates

        - name: logstash-security | Set permissions on PKCS8 key
          ansible.builtin.file:
            path: "{{ logstash_certs_dir }}/{{ inventory_hostname }}-pkcs8.key"
            owner: root
            group: logstash
            mode: "0640"
          tags:
            - certificates

        # -- CA certificate distribution --
        - name: logstash-security | Distribute CA certificate to Logstash host
          ansible.builtin.include_tasks:
            file: "{{ role_path }}/../elasticstack/tasks/certs/cert_distribute.yml"
            apply:
              tags:
                - certificates
          vars:
            _cert_src: "{{ elasticstack_ca_dir }}/ca.crt"
            _cert_dest: "{{ logstash_certs_dir }}/ca.crt"
            _cert_owner: root
            _cert_group: logstash
            _cert_mode: "0640"
            _cert_notify:
              - Restart Logstash
          tags:
            - certificates

- name: logstash-security | Handle standalone certificates
  when: _logstash_cert_mode == 'standalone'
  block:
    - name: logstash-security | Create certificate directory
      ansible.builtin.file:
        state: directory
        path: "{{ logstash_certs_dir }}"
        owner: root
        group: logstash
        mode: "0750"
      tags:
        - certificates

    - name: logstash-security | Generate standalone CA key
      ansible.builtin.command:
        cmd: >-
          openssl genrsa -out {{ logstash_certs_dir }}/standalone-ca.key 4096
        creates: "{{ logstash_certs_dir }}/standalone-ca.key"
      tags:
        - certificates

    - name: logstash-security | Generate standalone CA certificate
      ansible.builtin.command:
        cmd: >-
          openssl req -x509 -new -nodes
          -key {{ logstash_certs_dir }}/standalone-ca.key
          -sha256 -days {{ logstash_cert_validity_period }}
          -out {{ logstash_certs_dir }}/standalone-ca.crt
          -subj "/CN=Logstash Standalone CA"
        creates: "{{ logstash_certs_dir }}/standalone-ca.crt"
      tags:
        - certificates

    - name: logstash-security | Generate server key
      ansible.builtin.command:
        cmd: >-
          openssl genrsa -out {{ logstash_certs_dir }}/{{ inventory_hostname }}.key 2048
        creates: "{{ logstash_certs_dir }}/{{ inventory_hostname }}.key"
      tags:
        - certificates

    - name: logstash-security | Generate server certificate
      ansible.builtin.shell: |
        set -e
        openssl req -new \
          -key {{ logstash_certs_dir }}/{{ inventory_hostname }}.key \
          -out {{ logstash_certs_dir }}/{{ inventory_hostname }}.csr \
          -subj "/CN={{ inventory_hostname }}" \
          -addext "subjectAltName=DNS:{{ inventory_hostname }},DNS:{{ ansible_facts.hostname }},DNS:{{ ansible_facts.fqdn }},IP:{{ ansible_facts.default_ipv4.address | default(ansible_facts.all_ipv4_addresses[0]) }},DNS:localhost,IP:127.0.0.1"
        openssl x509 -req \
          -in {{ logstash_certs_dir }}/{{ inventory_hostname }}.csr \
          -CA {{ logstash_certs_dir }}/standalone-ca.crt \
          -CAkey {{ logstash_certs_dir }}/standalone-ca.key \
          -CAcreateserial \
          -out {{ logstash_certs_dir }}/{{ inventory_hostname }}-server.crt \
          -days {{ logstash_cert_validity_period }} -sha256 \
          -extfile <(printf "subjectAltName=DNS:{{ inventory_hostname }},DNS:{{ ansible_facts.hostname }},DNS:{{ ansible_facts.fqdn }},IP:{{ ansible_facts.default_ipv4.address | default(ansible_facts.all_ipv4_addresses[0]) }},DNS:localhost,IP:127.0.0.1")
      args:
        creates: "{{ logstash_certs_dir }}/{{ inventory_hostname }}-server.crt"
        executable: /bin/bash
      tags:
        - certificates

    - name: logstash-security | Create PKCS8 key for Logstash
      ansible.builtin.command: >
        openssl pkcs8
        -topk8
        -inform PEM
        -outform PEM
        -in {{ logstash_certs_dir }}/{{ inventory_hostname }}.key
        -out {{ logstash_certs_dir }}/{{ inventory_hostname }}-pkcs8.key
        -nocrypt
      args:
        creates: "{{ logstash_certs_dir }}/{{ inventory_hostname }}-pkcs8.key"
      tags:
        - certificates

    - name: logstash-security | Set permissions on standalone certificates
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: logstash
        mode: "0640"
      loop:
        - "{{ logstash_certs_dir }}/{{ inventory_hostname }}-server.crt"
        - "{{ logstash_certs_dir }}/{{ inventory_hostname }}-pkcs8.key"
        - "{{ logstash_certs_dir }}/standalone-ca.crt"
        - "{{ logstash_certs_dir }}/standalone-ca.key"
      tags:
        - certificates

    - name: logstash-security | Create PKCS12 keystore for ES output
      ansible.builtin.command: >
        openssl pkcs12 -export
        -in {{ logstash_certs_dir }}/{{ inventory_hostname }}-server.crt
        -inkey {{ logstash_certs_dir }}/{{ inventory_hostname }}.key
        -out {{ logstash_certs_dir }}/keystore.pfx
        -passout pass:{{ logstash_tls_key_passphrase }}
        -name {{ inventory_hostname }}
      args:
        creates: "{{ logstash_certs_dir }}/keystore.pfx"
      no_log: "{{ elasticstack_no_log }}"
      notify:
        - Restart Logstash
      tags:
        - certificates

    - name: logstash-security | Set keystore permissions
      ansible.builtin.file:
        path: "{{ logstash_certs_dir }}/keystore.pfx"
        owner: root
        group: logstash
        mode: "0640"
      tags:
        - certificates

    - name: logstash-security | Distribute ES CA certificate to Logstash host
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/certs/cert_distribute.yml"
        apply:
          tags:
            - certificates
      vars:
        _cert_src: "{{ elasticstack_ca_dir }}/ca.crt"
        _cert_dest: "{{ logstash_certs_dir }}/ca.crt"
        _cert_owner: root
        _cert_group: logstash
        _cert_mode: "0640"
        _cert_notify:
          - Restart Logstash
      tags:
        - certificates

- name: logstash-security | Manage Elasticsearch user and role
  when: _logstash_cert_mode in ['elasticsearch_ca', 'standalone']
  block:
    - name: logstash-security | Validate logstash user password length
      ansible.builtin.fail:
        msg: "Logstash user password must be at least 6 characters long"
      when: logstash_user_password | length < 6

    - name: logstash-security | Fetch Elastic admin password
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/../elasticstack/tasks/fetch_password.yml"
      vars:
        _password_user: elastic
        _password_fact: _logstash_elastic_password

    - name: logstash-security | Set ES API URL fact
      ansible.builtin.set_fact:
        _logstash_es_url: "https://{{ hostvars[elasticstack_ca_host].ansible_host | default(hostvars[elasticstack_ca_host].inventory_hostname) }}:{{ elasticstack_elasticsearch_http_port }}"

    - name: logstash-security | Create logstash role
      ansible.builtin.uri:
        url: "{{ _logstash_es_url }}/_security/role/{{ logstash_role_name }}"
        method: PUT
        user: elastic
        password: "{{ _logstash_elastic_password.stdout }}"
        force_basic_auth: true
        validate_certs: true
        ca_path: "{{ logstash_certs_dir }}/ca.crt"
        body_format: json
        body:
          cluster: "{{ logstash_role_cluster_privileges }}"
          indices:
            - names: "{{ logstash_role_indicies_names }}"
              privileges: "{{ logstash_role_indicies_privileges }}"
        status_code: [200]
      register: _logstash_role_result
      changed_when: _logstash_role_result.json.role.created | default(false)
      no_log: "{{ elasticstack_no_log }}"
      when: logstash_create_role | bool

    - name: logstash-security | Create logstash user
      ansible.builtin.uri:
        url: "{{ _logstash_es_url }}/_security/user/{{ logstash_user_name }}"
        method: PUT
        user: elastic
        password: "{{ _logstash_elastic_password.stdout }}"
        force_basic_auth: true
        validate_certs: true
        ca_path: "{{ logstash_certs_dir }}/ca.crt"
        body_format: json
        body:
          password: "{{ logstash_user_password }}"
          full_name: "{{ logstash_user_fullname }}"
          email: "{{ logstash_user_email | default(omit) }}"
          roles:
            - "{{ logstash_role_name }}"
          enabled: true
        status_code: [200]
      register: _logstash_user_result
      changed_when: _logstash_user_result.json.created | default(false)
      no_log: "{{ elasticstack_no_log }}"
      when: logstash_create_user | bool
