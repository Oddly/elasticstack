---
- name: Elasticsearch upgrade detection contract
  hosts: localhost
  gather_facts: false
  vars:
    elasticstack_version: latest
  tasks:
    - name: Detect no upgrade when installed major matches release
      vars:
        elasticstack_release: 9
      block:
        - name: Set matching installed package facts
          ansible.builtin.set_fact:
            ansible_facts:
              packages:
                elasticsearch:
                  - version: 9.1.0

        - name: Run upgrade detection
          ansible.builtin.include_tasks: ../../roles/elasticsearch/tasks/elasticsearch-upgrade-detection.yml

        - name: Assert matching release does not need rolling upgrade
          ansible.builtin.assert:
            that:
              - not _elasticsearch_needs_rolling_upgrade | bool

    - name: Detect pinned version upgrade
      vars:
        elasticstack_release: 9
        elasticstack_version: 9.2.0
      block:
        - name: Set older installed package facts
          ansible.builtin.set_fact:
            ansible_facts:
              packages:
                elasticsearch:
                  - version: 9.1.0

        - name: Run upgrade detection
          ansible.builtin.include_tasks: ../../roles/elasticsearch/tasks/elasticsearch-upgrade-detection.yml

        - name: Assert pinned newer version needs rolling upgrade
          ansible.builtin.assert:
            that:
              - _elasticsearch_needs_rolling_upgrade | bool

    - name: Detect major release upgrade from supported 8.19
      vars:
        elasticstack_release: 9
        elasticstack_version: latest
      block:
        - name: Set supported 8.19 package facts
          ansible.builtin.set_fact:
            ansible_facts:
              packages:
                elasticsearch:
                  - version: 8.19.6

        - name: Run upgrade detection
          ansible.builtin.include_tasks: ../../roles/elasticsearch/tasks/elasticsearch-upgrade-detection.yml

        - name: Assert supported major upgrade needs rolling upgrade
          ansible.builtin.assert:
            that:
              - _elasticsearch_needs_rolling_upgrade | bool

    - name: Detect absent package as no pre-install rolling upgrade
      vars:
        elasticstack_release: 9
        elasticstack_version: latest
      block:
        - name: Set absent package facts
          ansible.builtin.set_fact:
            ansible_facts:
              packages: {}

        - name: Run upgrade detection
          ansible.builtin.include_tasks: ../../roles/elasticsearch/tasks/elasticsearch-upgrade-detection.yml

        - name: Assert absent package does not need pre-install rolling upgrade
          ansible.builtin.assert:
            that:
              - not _elasticsearch_needs_rolling_upgrade | bool

    - name: Reject unsupported 8.x to 9.x upgrade path
      vars:
        elasticstack_release: 9
        elasticstack_version: latest
      block:
        - name: Set unsupported 8.x package facts
          ansible.builtin.set_fact:
            ansible_facts:
              packages:
                elasticsearch:
                  - version: 8.18.2

        - name: Run upgrade detection expecting failure
          ansible.builtin.include_tasks: ../../roles/elasticsearch/tasks/elasticsearch-upgrade-detection.yml

        - name: Unsupported upgrade path should fail
          ansible.builtin.fail:
            msg: Unsupported 8.x to 9.x upgrade path did not fail.

      rescue:
        - name: Assert unsupported upgrade failure is clear
          ansible.builtin.assert:
            that:
              - ansible_failed_result.msg is search('Elasticsearch 9.x requires 8.19.x first')
