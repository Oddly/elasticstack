---
# Test Kibana with external certificates where the CA is trusted via the
# system trust store instead of being passed to the role. This validates
# that elasticsearch.ssl.certificateAuthorities is correctly omitted from
# kibana.yml when no CA is provided.

- name: Generate test certificates on nodes
  hosts: all
  gather_facts: true
  tasks:
    - name: Install openssl
      ansible.builtin.package:
        name: openssl
        state: present

    - name: Create cert working directory
      ansible.builtin.file:
        path: /tmp/test-certs
        state: directory
        mode: "0700"

    - name: Generate CA private key
      ansible.builtin.command:
        cmd: openssl genrsa -out /tmp/test-certs/ca.key 2048
        creates: /tmp/test-certs/ca.key

    - name: Generate CA certificate
      ansible.builtin.command:
        cmd: >-
          openssl req -x509 -new -nodes
          -key /tmp/test-certs/ca.key
          -sha256 -days 365
          -subj "/CN=Test CA"
          -out /tmp/test-certs/ca.crt
        creates: /tmp/test-certs/ca.crt

    - name: Generate transport key
      ansible.builtin.command:
        cmd: openssl genrsa -out /tmp/test-certs/transport.key 2048
        creates: /tmp/test-certs/transport.key

    - name: Create transport CSR config
      ansible.builtin.copy:
        content: |
          [req]
          distinguished_name = req_dn
          req_extensions = v3_req
          prompt = no
          [req_dn]
          CN = {{ ansible_facts.hostname }}
          [v3_req]
          subjectAltName = DNS:{{ ansible_facts.hostname }},DNS:{{ ansible_facts.fqdn }},DNS:{{ inventory_hostname }},DNS:localhost,IP:{{ ansible_facts.default_ipv4.address | default(ansible_facts.all_ipv4_addresses[0]) }},IP:127.0.0.1
        dest: /tmp/test-certs/transport.cnf
        mode: "0600"

    - name: Generate transport CSR
      ansible.builtin.command:
        cmd: >-
          openssl req -new
          -key /tmp/test-certs/transport.key
          -config /tmp/test-certs/transport.cnf
          -out /tmp/test-certs/transport.csr
        creates: /tmp/test-certs/transport.csr

    - name: Sign transport certificate
      ansible.builtin.command:
        cmd: >-
          openssl x509 -req
          -in /tmp/test-certs/transport.csr
          -CA /tmp/test-certs/ca.crt
          -CAkey /tmp/test-certs/ca.key
          -CAcreateserial
          -out /tmp/test-certs/transport.crt
          -days 365 -sha256
          -extensions v3_req
          -extfile /tmp/test-certs/transport.cnf
        creates: /tmp/test-certs/transport.crt

    - name: Generate HTTP key
      ansible.builtin.command:
        cmd: openssl genrsa -out /tmp/test-certs/http.key 2048
        creates: /tmp/test-certs/http.key

    - name: Create HTTP CSR config
      ansible.builtin.copy:
        content: |
          [req]
          distinguished_name = req_dn
          req_extensions = v3_req
          prompt = no
          [req_dn]
          CN = {{ ansible_facts.hostname }}-http
          [v3_req]
          subjectAltName = DNS:{{ ansible_facts.hostname }},DNS:{{ ansible_facts.fqdn }},DNS:{{ inventory_hostname }},DNS:localhost,IP:{{ ansible_facts.default_ipv4.address | default(ansible_facts.all_ipv4_addresses[0]) }},IP:127.0.0.1
        dest: /tmp/test-certs/http.cnf
        mode: "0600"

    - name: Generate HTTP CSR
      ansible.builtin.command:
        cmd: >-
          openssl req -new
          -key /tmp/test-certs/http.key
          -config /tmp/test-certs/http.cnf
          -out /tmp/test-certs/http.csr
        creates: /tmp/test-certs/http.csr

    - name: Sign HTTP certificate
      ansible.builtin.command:
        cmd: >-
          openssl x509 -req
          -in /tmp/test-certs/http.csr
          -CA /tmp/test-certs/ca.crt
          -CAkey /tmp/test-certs/ca.key
          -CAcreateserial
          -out /tmp/test-certs/http.crt
          -days 365 -sha256
          -extensions v3_req
          -extfile /tmp/test-certs/http.cnf
        creates: /tmp/test-certs/http.crt

    # Add CA to system trust store so ES and Kibana can verify without
    # the role having to manage a ca.crt file.
    - name: Add CA to system trust store (Debian)
      when: ansible_facts.os_family == 'Debian'
      block:
        - name: Copy CA to trusted certificates
          ansible.builtin.copy:
            src: /tmp/test-certs/ca.crt
            dest: /usr/local/share/ca-certificates/test-ca.crt
            remote_src: true
            mode: "0644"
        - name: Update CA trust store
          ansible.builtin.command: update-ca-certificates
          changed_when: true

    - name: Add CA to system trust store (RedHat)
      when: ansible_facts.os_family == 'RedHat'
      block:
        - name: Copy CA to trusted certificates
          ansible.builtin.copy:
            src: /tmp/test-certs/ca.crt
            dest: /etc/pki/ca-trust/source/anchors/test-ca.crt
            remote_src: true
            mode: "0644"
        - name: Update CA trust store
          ansible.builtin.command: update-ca-trust
          changed_when: true

- name: Converge — ES + Kibana with external certs, CA in system trust store
  hosts: all
  vars:
    elasticstack_release: "{{ lookup('env', 'ELASTIC_RELEASE') | default('9', true) | int }}"
    elasticstack_full_stack: true
    elasticstack_no_log: false
    elasticsearch_heap: "1"
    # ES: external certs, CA via system trust store
    elasticsearch_cert_source: external
    elasticsearch_transport_tls_certificate: /tmp/test-certs/transport.crt
    elasticsearch_transport_tls_key: /tmp/test-certs/transport.key
    elasticsearch_http_tls_certificate: /tmp/test-certs/http.crt
    elasticsearch_http_tls_key: /tmp/test-certs/http.key
    elasticsearch_tls_remote_src: true
    elasticsearch_ssl_verification_mode: certificate
    # Kibana: external cert source, no web TLS, no CA — uses system trust store
    kibana_cert_source: external
    kibana_tls: false
  tasks:
    - name: Include Elastic repos
      ansible.builtin.include_role:
        name: oddly.elasticstack.repos

    - name: Deploy Elasticsearch
      ansible.builtin.include_role:
        name: oddly.elasticstack.elasticsearch
      when: "'elasticsearch' in group_names"

    - name: CI — set lenient disk watermarks
      ansible.builtin.include_tasks: ../shared/set_ci_watermarks.yml
      when: "'elasticsearch' in group_names"

    - name: CI — clean cache after ES
      ansible.builtin.include_tasks: ../shared/cleanup_cache.yml

    - name: Deploy Kibana
      ansible.builtin.include_role:
        name: oddly.elasticstack.kibana
      when: "'kibana' in group_names"
