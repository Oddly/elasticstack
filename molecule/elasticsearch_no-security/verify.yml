---
- name: Verify
  hosts: all
  vars:
    elasticstack_elasticsearch_http_port: 9200
    elasticstack_elasticsearch_group_name: elasticsearchXYZ
  tasks:

    - name: Check that security is disabled in elasticsearch.yml
      ansible.builtin.slurp:
        src: /etc/elasticsearch/elasticsearch.yml
      register: _es_config

    - name: Assert xpack.security.enabled is false
      ansible.builtin.assert:
        that:
          - "'xpack.security.enabled: false' in (_es_config.content | b64decode)"
        fail_msg: "xpack.security.enabled: false not found in elasticsearch.yml"

# Remember, this is the no-security scenario. So no https
# The comment below will create an exception for KICS security scan
    - name: Health check
      ansible.builtin.uri:
# kics-scan ignore-line
        url: http://localhost:{{ elasticstack_elasticsearch_http_port }}/_cluster/health
        method: GET
        return_content: true
        status_code: 200
        validate_certs: false
      register: result
      until: result.json.status is defined and result.json.status in ["green", "yellow"]
      retries: 6
      delay: 10

    - name: Assert cluster is healthy
      ansible.builtin.assert:
        that:
          - result.json.status in ["green", "yellow"]
        fail_msg: "Cluster health is {{ result.json.status | default('unknown') }}"

    - name: Node check
      ansible.builtin.uri:
# kics-scan ignore-line
        url: http://localhost:{{ elasticstack_elasticsearch_http_port }}/_cat/nodes
        method: GET
        return_content: true
        status_code: 200
        validate_certs: false
      register: nodes

    - name: Check if all Nodes see each other
      ansible.builtin.assert:
        that:
          - "'{{ item }}' in nodes.content"
        fail_msg: "'{{ item }}' was not found in nodes.content"
        success_msg: "'{{ item }}' was found in nodes.content"
      loop: "{{ groups['all'] }}"
      when: groups[elasticstack_elasticsearch_group_name] | length > 1
