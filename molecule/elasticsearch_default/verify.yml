---
- name: Verify Elasticsearch default cluster
  hosts: elasticsearch
  tasks:
    - name: Fetch elastic password
      ansible.builtin.include_tasks: ../shared/verify_fetch_password.yml

    - name: Check cluster health
      ansible.builtin.include_tasks: ../shared/verify_es_health.yml
      vars:
        _verify_run_once: true

    - name: Verify expected number of nodes
      ansible.builtin.assert:
        that:
          - health.json.number_of_nodes == groups['elasticsearch'] | length
        fail_msg: "Expected {{ groups['elasticsearch'] | length }} nodes, got {{ health.json.number_of_nodes }}"
      run_once: true  # noqa: run-once[task]
