---
- name: Verify Elasticsearch default cluster
  hosts: elasticsearch
  vars:
    elasticstack_release: "{{ lookup('env', 'ELASTIC_RELEASE') | default('9', true) | int }}"
  tasks:
    - name: Fetch elastic password
      ansible.builtin.include_tasks: ../shared/verify_fetch_password.yml
      vars:
        _verify_elastic_password: "TestPassword123!"

    - name: Check cluster health
      ansible.builtin.include_tasks: ../shared/verify_es_health.yml
      vars:
        _verify_run_once: true

    - name: Verify expected number of nodes
      ansible.builtin.assert:
        that:
          - health.json.number_of_nodes == groups['elasticsearch'] | length
        fail_msg: "Expected {{ groups['elasticsearch'] | length }} nodes, got {{ health.json.number_of_nodes }}"
      run_once: true  # noqa: run-once[task]

    - name: Verify auto-generated password no longer works  # noqa: run-once[task]
      block:
        - name: Read auto-generated password from file  # noqa: run-once[task]
          ansible.builtin.shell: |
            set -o pipefail
            grep "PASSWORD elastic " /usr/share/elasticsearch/initial_passwords |
            awk {' print $4 '}
          args:
            executable: /bin/bash
          register: _old_pass
          changed_when: false
          run_once: true

        - name: Try API with old password (should fail)  # noqa: run-once[task]
          ansible.builtin.uri:
            url: "https://localhost:9200/"
            user: elastic
            password: "{{ _old_pass.stdout }}"
            force_basic_auth: true
            validate_certs: false
            status_code: 401
          run_once: true
          when: _old_pass.stdout != "TestPassword123!"

    - name: Read cluster settings  # noqa: run-once[task]
      ansible.builtin.uri:
        url: "https://localhost:9200/_cluster/settings?flat_settings=true"
        method: GET
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        force_basic_auth: true
        validate_certs: false
      register: cluster_settings
      run_once: true

    - name: Verify cluster settings were applied  # noqa: run-once[task]
      ansible.builtin.assert:
        that:
          - cluster_settings.json.persistent['action.destructive_requires_name'] == 'true'
        fail_msg: >-
          elasticsearch_cluster_settings not applied.
          Got: {{ cluster_settings.json.persistent }}
      run_once: true

    - name: Verify LogsDB is enabled (9.x default)  # noqa: run-once[task]
      ansible.builtin.assert:
        that:
          - cluster_settings.json.persistent['cluster.logsdb.enabled'] == 'true'
        fail_msg: >-
          LogsDB not enabled.
          Got: {{ cluster_settings.json.persistent }}
      run_once: true
      when: elasticstack_release | int >= 9

    # OS tuning checks
    - name: Verify vm.max_map_count  # noqa: run-once[task]
      ansible.builtin.command: sysctl -n vm.max_map_count
      register: _max_map_count
      changed_when: false
      run_once: true

    - name: Assert vm.max_map_count is 262144  # noqa: run-once[task]
      ansible.builtin.assert:
        that:
          - _max_map_count.stdout | int == 262144
        fail_msg: "vm.max_map_count is {{ _max_map_count.stdout }}, expected 262144"
      run_once: true

    - name: Verify vm.swappiness  # noqa: run-once[task]
      ansible.builtin.command: sysctl -n vm.swappiness
      register: _swappiness
      changed_when: false
      run_once: true

    - name: Assert vm.swappiness is 1  # noqa: run-once[task]
      ansible.builtin.assert:
        that:
          - _swappiness.stdout | int == 1
        fail_msg: "vm.swappiness is {{ _swappiness.stdout }}, expected 1"
      run_once: true
