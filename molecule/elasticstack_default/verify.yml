---

- name: Verify outcome of collection
  hosts: all
  vars:
    elasticstack_elasticsearch_http_port: 9200
    elasticstack_initial_passwords: /usr/share/elasticsearch/initial_passwords
    elasticstack_elasticsearch_group_name: elasticsearch
  tasks:

    - name: Check Logstash service is running
      ansible.builtin.service:
        name: logstash
        state: started
      check_mode: true
      register: logstash_svc
      failed_when: logstash_svc.changed
      when: "'logstash' in group_names"

    - name: Check for open port 5044/tcp
      ansible.builtin.wait_for:
        port: 5044
      when: "'logstash' in group_names"

    - name: Stop Logstash for syntax check
      ansible.builtin.service:
        name: logstash
        state: stopped
      when: "'logstash' in group_names"

    - name: Run Logstash syntax check
      ansible.builtin.command: "/usr/share/logstash/bin/logstash --path.settings=/etc/logstash -t"
      become: true
      become_user: logstash
      become_method: ansible.builtin.su
      become_flags: '-s /bin/sh'
      environment:
        HOME: /tmp
      when: "'logstash' in group_names"
      changed_when: false

    - name: Start Logstash after syntax check
      ansible.builtin.service:
        name: logstash
        state: started
      when: "'logstash' in group_names"

    - name: Set elasticsearch_ca variable if not already done by user
      ansible.builtin.set_fact:
        elasticsearch_ca: "{{ groups[elasticstack_elasticsearch_group_name][0] }}"
      when: elasticsearch_ca is undefined

    - name: Fetch Elastic password
      ansible.builtin.shell: |
        set -o pipefail
        grep "PASSWORD elastic " /usr/share/elasticsearch/initial_passwords |
        awk {' print $4 '}
      args:
        executable: /bin/bash
      register: elastic_pass
      changed_when: false
      delegate_to: "{{ elasticsearch_ca }}"

    - name: Wait for events to flow through Logstash pipeline
      ansible.builtin.uri:
        url: "http://localhost:9600/_node/stats/pipelines"
        return_content: true
      register: logstash_stats
      changed_when: false
      retries: 12
      delay: 10
      until: (logstash_stats.json.pipelines.main.events.out | default(0) | int) > 0
      when: "'logstash' in group_names"

    - name: Show Logstash pipeline stats
      ansible.builtin.debug:
        msg: "Logstash events — in: {{ logstash_stats.json.pipelines.main.events.in }}, out: {{ logstash_stats.json.pipelines.main.events.out }}"
      when: "'logstash' in group_names"

    - name: Run Kibana checks
      when: "'kibana' in group_names"
      block:

        - name: Fetch kibana.yml
          ansible.builtin.command: cat /etc/kibana/kibana.yml
          register: kibanayml
          changed_when: false

        - name: Show kibana.yml
          ansible.builtin.debug:
            var: kibanayml.stdout_lines

        - name: Check for Kibana port
          ansible.builtin.wait_for:
            port: 5601
            timeout: 120

        - name: Connect to Kibana
          ansible.builtin.uri:
            url: "http://{{ ansible_facts.hostname }}:5601/api/status"
            method: GET
            force_basic_auth: true
            user: elastic
            password: "{{ elastic_pass.stdout }}"
            return_content: true
          register: kibana_status
          retries: 6
          delay: 10
          until: "'green' in (kibana_status.content | default('')) or 'Elasticsearch is available' in (kibana_status.content | default(''))"
          failed_when:
            - "'green' not in (kibana_status.content | default(''))"
            - "'Elasticsearch is available' not in (kibana_status.content | default(''))"

    - name: Run Beats checks
      when: "'beats' in group_names"
      block:
        - name: Check filebeat service is running
          ansible.builtin.service:
            name: filebeat
            state: started
          check_mode: true
          register: filebeat_svc
          failed_when: filebeat_svc.changed

        - name: Check metricbeat service is running
          ansible.builtin.service:
            name: metricbeat
            state: started
          check_mode: true
          register: metricbeat_svc
          failed_when: metricbeat_svc.changed

        - name: Check auditbeat package is installed
          ansible.builtin.package:
            name: auditbeat
            state: present
          check_mode: true
          register: auditbeat_pkg
          failed_when: auditbeat_pkg.changed

    - name: Elasticsearch health check
      ansible.builtin.uri:
        url: https://localhost:{{ elasticstack_elasticsearch_http_port }}/_cluster/health
        method: GET
        force_basic_auth: true
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        return_content: true
        status_code: 200
        validate_certs: false
      register: result
      until: result.json.status == "green"
      retries: 6
      delay: 10
      when: groups[elasticstack_elasticsearch_group_name] | length > 1

    - name: Elasticsearch Node check
      ansible.builtin.uri:
        url: https://localhost:{{ elasticstack_elasticsearch_http_port }}/_cat/nodes
        method: GET
        force_basic_auth: true
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        return_content: true
        status_code: 200
        validate_certs: false
      register: nodes
      when: groups[elasticstack_elasticsearch_group_name] | length > 1

    - name: Check if all Nodes see each other
      ansible.builtin.assert:
        that:
          - item in nodes.content
        fail_msg: "{{ item }} was not found in nodes.content"
        success_msg: "{{ item }} was found in nodes.content"
      loop: "{{ groups['all'] }}"
      when: groups[elasticstack_elasticsearch_group_name] | length > 1
