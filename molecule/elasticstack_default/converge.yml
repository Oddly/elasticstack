---

# The workaround for arbitrarily named role directory is important because the
# git repo has one name and the role within it another
# Found at:
# https://github.com/ansible-community/molecule/issues/1567#issuecomment-436876722

- name: Converge
  hosts: all
  vars:
    elasticsearch_monitoring_enabled: false
    elasticstack_release: "{{ lookup('env', 'ELASTIC_RELEASE') | default('9', true) | int }}"
    elasticsearch_heap: "1"
    logstash_heap: "512m"

    elasticstack_full_stack: true
    elasticstack_no_log: false
    logstash_pipeline_unsafe_shutdown: true
    logstash_input_beats_ssl: true
    beats_filebeat_journald: true
    beats_filebeat_modules:
      - system
    beats_auditbeat: true
    beats_auditbeat_enable: false  # can't run in containers (permissions)
    beats_metricbeat: true
    beats_fields:
      - "testbed: molecule"
    kibana_extra_config:
      ops.interval: 5000
  tasks:
    - name: Enable Elastic installation on RHEL 9
      ansible.builtin.set_fact:
        elasticstack_rpm_workaround: true
      when: ansible_facts.os_family == 'RedHat' and ansible_facts.distribution_major_version | int >= 9
    - name: Include Elastic Repos
      ansible.builtin.include_role:
        name: oddly.elasticstack.repos
    - name: Include Elasticsearch role
      ansible.builtin.include_role:
        name: oddly.elasticstack.elasticsearch
    - name: CI — clean cache and set watermarks after ES
      ansible.builtin.include_tasks: ../shared/cleanup_cache.yml
    - name: CI — set lenient disk watermarks
      ansible.builtin.include_tasks: ../shared/set_ci_watermarks.yml
    - name: Include logstash
      ansible.builtin.include_role:
        name: oddly.elasticstack.logstash
    - name: CI — clean cache after Logstash
      ansible.builtin.include_tasks: ../shared/cleanup_cache.yml
    - name: Include kibana
      ansible.builtin.include_role:
        name: oddly.elasticstack.kibana
    - name: CI — clean cache after Kibana
      ansible.builtin.include_tasks: ../shared/cleanup_cache.yml
    - name: Include Beats
      ansible.builtin.include_role:
        name: oddly.elasticstack.beats
