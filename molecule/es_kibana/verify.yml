---
- name: Verify ES + Kibana deployment
  hosts: all
  vars:
    elasticstack_elasticsearch_http_port: 9200
    elasticstack_elasticsearch_group_name: elasticsearch
  tasks:
    - name: Set elasticsearch_ca variable
      ansible.builtin.set_fact:
        elasticsearch_ca: "{{ groups[elasticstack_elasticsearch_group_name][0] }}"
      when: elasticsearch_ca is undefined

    - name: Fetch Elastic password
      ansible.builtin.shell: |
        set -o pipefail
        grep "PASSWORD elastic " /usr/share/elasticsearch/initial_passwords |
        awk {' print $4 '}
      args:
        executable: /bin/bash
      register: elastic_pass
      changed_when: false
      delegate_to: "{{ elasticsearch_ca }}"

    - name: Elasticsearch health check
      ansible.builtin.uri:
        url: "https://localhost:{{ elasticstack_elasticsearch_http_port }}/_cluster/health?wait_for_status=yellow&timeout=30s"
        method: GET
        force_basic_auth: true
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        return_content: true
        status_code: 200
        validate_certs: false
      register: result
      until: result.json.status | default('red') in ['green', 'yellow']
      retries: 6
      delay: 10
      when: "'elasticsearch' in group_names"

    - name: Verify cluster has 2 nodes
      ansible.builtin.assert:
        that:
          - result.json.number_of_nodes == 2
        fail_msg: "Expected 2 nodes, got {{ result.json.number_of_nodes }}"
      when: "'elasticsearch' in group_names"

    - name: Report cluster health
      ansible.builtin.debug:
        msg: "Cluster status: {{ result.json.status }}, nodes: {{ result.json.number_of_nodes }}"
      when: "'elasticsearch' in group_names"

    - name: Connect to Kibana
      ansible.builtin.uri:
        url: "http://localhost:5601/api/status"
        method: GET
        force_basic_auth: true
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        return_content: true
        status_code: [200, 503]
      register: kibana_status
      retries: 30
      delay: 10
      until: (kibana_status.json.status.overall.level | default('')) == 'available'
      when: "'kibana' in group_names"

    - name: Verify Kibana is available
      ansible.builtin.assert:
        that:
          - kibana_status.json.status.overall.level == 'available'
        fail_msg: "Kibana status: {{ kibana_status.json.status.overall.level | default('unknown') }}"
      when: "'kibana' in group_names"

    # -- Custom keystore entries --
    - name: List Elasticsearch keystore entries
      ansible.builtin.command: /usr/share/elasticsearch/bin/elasticsearch-keystore list
      register: keystore_list
      changed_when: false
      when: "'elasticsearch' in group_names"

    - name: Verify custom keystore entry exists
      ansible.builtin.assert:
        that:
          - "'xpack.notification.slack.account.test.secure_url' in keystore_list.stdout_lines"
        fail_msg: "Custom keystore entry not found in: {{ keystore_list.stdout_lines }}"
      when: "'elasticsearch' in group_names"

    - name: Verify custom keystore entry has correct value
      ansible.builtin.command: >
        /usr/share/elasticsearch/bin/elasticsearch-keystore
        show xpack.notification.slack.account.test.secure_url
      register: keystore_value
      changed_when: false
      when: "'elasticsearch' in group_names"

    - name: Assert custom keystore value
      ansible.builtin.assert:
        that:
          - keystore_value.stdout == "https://hooks.example.com/test"
        fail_msg: "Expected 'https://hooks.example.com/test', got '{{ keystore_value.stdout }}'"
      when: "'elasticsearch' in group_names"

    # -- kibana_system_password --
    - name: Verify kibana_system can authenticate with custom password
      ansible.builtin.uri:
        url: "https://localhost:9200/_security/_authenticate"
        method: GET
        force_basic_auth: true
        user: kibana_system
        password: "molecule-kibana-test-pw"
        validate_certs: false
        status_code: 200
      register: kibana_auth
      when: "'elasticsearch' in group_names"
      delegate_to: "{{ elasticsearch_ca }}"

    - name: Assert kibana_system authentication succeeded
      ansible.builtin.assert:
        that:
          - kibana_auth.json.username == 'kibana_system'
        fail_msg: "kibana_system auth failed: {{ kibana_auth.json | default('no response') }}"
      when: "'elasticsearch' in group_names"
      delegate_to: "{{ elasticsearch_ca }}"
