---
# Set lenient disk watermarks for CI containers.
# Include this from converge.yml after the Elasticsearch role in
# scenarios where disk space is constrained. Runs once per cluster.
#
# Requires: Elasticsearch running with security enabled.
- name: Read elastic password for watermark setup
  ansible.builtin.shell: |
    set -o pipefail
    grep "PASSWORD elastic " /usr/share/elasticsearch/initial_passwords |
    awk '{ print $4 }'
  args:
    executable: /bin/bash
  register: _ci_elastic_pass
  changed_when: false
  no_log: true

- name: Set lenient disk watermarks (CI)
  ansible.builtin.uri:
    url: "https://localhost:9200/_cluster/settings"
    method: PUT
    body:
      persistent:
        cluster.routing.allocation.disk.watermark.low: "97%"
        cluster.routing.allocation.disk.watermark.high: "98%"
        cluster.routing.allocation.disk.watermark.flood_stage: "99%"
        cluster.routing.allocation.disk.watermark.flood_stage.frozen: "99%"
    body_format: json
    user: elastic
    password: "{{ _ci_elastic_pass.stdout }}"
    validate_certs: false
    force_basic_auth: true
  register: _ci_watermark_result
  until: _ci_watermark_result.status | default(0) == 200
  retries: 5
  delay: 10
  changed_when: false
  no_log: true
  run_once: true
