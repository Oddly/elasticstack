---
# Fetch the elastic user password from the initial_passwords file.
# Optional variables:
#   _verify_delegate_to: host to delegate to (default: omitted, runs locally)
#   _verify_run_once: whether to run once (default: true)
- name: Fetch Elastic password
  ansible.builtin.shell: |
    set -o pipefail
    grep "PASSWORD elastic " /usr/share/elasticsearch/initial_passwords |
    awk {' print $4 '}
  args:
    executable: /bin/bash
  register: elastic_pass
  changed_when: false
  run_once: "{{ _verify_run_once | default(true) }}"  # noqa: run-once[task]
  delegate_to: "{{ _verify_delegate_to | default(omit) }}"
