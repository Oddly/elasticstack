---
# Fetch the elastic user password for verify tasks.
# If _verify_elastic_password is set, use it directly.
# Otherwise, read from the initial_passwords file.
# Optional variables:
#   _verify_elastic_password: user-defined elastic password (skips file read)
#   _verify_delegate_to: host to delegate to (default: omitted, runs locally)
#   _verify_run_once: whether to run once (default: true)

- name: Use user-defined elastic password
  ansible.builtin.set_fact:
    elastic_pass:
      stdout: "{{ _verify_elastic_password }}"
  when: _verify_elastic_password | default('') | length > 0
  run_once: "{{ _verify_run_once | default(true) }}"  # noqa: run-once[task]

- name: Fetch Elastic password from file
  ansible.builtin.shell: |
    set -o pipefail
    grep "PASSWORD elastic " /usr/share/elasticsearch/initial_passwords |
    awk {' print $4 '}
  args:
    executable: /bin/bash
  register: elastic_pass
  changed_when: false
  run_once: "{{ _verify_run_once | default(true) }}"  # noqa: run-once[task]
  delegate_to: "{{ _verify_delegate_to | default(omit) }}"
  when: _verify_elastic_password | default('') | length == 0
