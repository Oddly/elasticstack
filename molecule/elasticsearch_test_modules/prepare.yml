---
- name: Prepare
  hosts: all
  vars:
    distro_cache_url: "{{ lookup('env', 'DISTRO_CACHE_URL') }}"
  tasks:
    - name: Wait for systemd to finish booting
      ansible.builtin.shell: |
        set -o pipefail
        for i in $(seq 1 15); do
          state=$(systemctl is-system-running 2>/dev/null || true)
          if [ "$state" = "running" ] || [ "$state" = "degraded" ]; then
            echo "systemd ready: $state (after ${i}s)"
            exit 0
          fi
          sleep 1
        done
        echo "systemd not ready after 15s, state: $state"
        echo "PID 1: $(cat /proc/1/cmdline | tr '\0' ' ')"
        echo "D-Bus: $(ls /run/dbus/system_bus_socket 2>&1)"
        echo "/run: $(ls /run/)"
      args:
        executable: /bin/bash
      register: systemd_wait
      changed_when: false
      failed_when: false

    - name: Show systemd status
      ansible.builtin.debug:
        var: systemd_wait.stdout_lines

    - name: Common prepare tasks
      ansible.builtin.include_tasks: ../shared/prepare_common.yml
