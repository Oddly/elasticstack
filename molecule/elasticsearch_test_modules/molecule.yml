---
prerun: false
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: default
platforms:
  - name: "es-mod-${MOLECULE_DISTRO:-debian11}-r${ELASTIC_RELEASE:-9}${MOLECULE_RUN_SUFFIX}"
    groups:
      - elasticsearch
    distro: "${MOLECULE_DISTRO:-debian11}"
    memory_mb: 4096
provisioner:
  name: ansible
  env:
    ANSIBLE_LOG_PATH: /var/log/ansible.log
  connection_options:
    ansible_connection: ssh
    ansible_user: root
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /usr/bin/python3
  # Just enable temporarily. Sometimes it's useful, but most of the time it's
  # overwhelming
  # env:
  #   ANSIBLE_VERBOSITY: 3
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
