---
- name: Verify ES security API (role and user CRUD)
  hosts: all
  tasks:
    - name: Fetch Elastic password
      ansible.builtin.shell: |
        set -o pipefail
        grep "PASSWORD elastic " /usr/share/elasticsearch/initial_passwords |
        awk {' print $4 '}
      args:
        executable: /bin/bash
      register: elastic_pass
      changed_when: false

    - name: Get ES version
      ansible.builtin.uri:
        url: https://localhost:9200/
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: es_info
      retries: 5
      delay: 5
      until: es_info.status | default(0) == 200

    - name: Test 1 - Create role via REST API
      ansible.builtin.uri:
        url: https://localhost:9200/_security/role/api-test-role
        method: PUT
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          cluster:
            - monitor
            - manage_own_api_key
          indices:
            - names:
                - test-index-*
              privileges:
                - read
                - write
        status_code: [200]
      register: role_create
      retries: 3
      delay: 5
      until: role_create.status | default(0) == 200

    - name: Verify role creation succeeded
      ansible.builtin.assert:
        that:
          - role_create.json.role.created | default(false)
        success_msg: "Role created on ES {{ es_info.json.version.number }}"

    - name: Test 2 - Create user via REST API
      ansible.builtin.uri:
        url: https://localhost:9200/_security/user/api-test-user
        method: PUT
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          password: "TestPassword123!"
          full_name: API Test User
          email: test@example.com
          roles:
            - api-test-role
          enabled: true
        status_code: [200]
      register: user_create
      retries: 3
      delay: 5
      until: user_create.status | default(0) == 200

    - name: Verify user creation succeeded
      ansible.builtin.assert:
        that:
          - user_create.json.created | default(false)
        success_msg: "User created on ES {{ es_info.json.version.number }}"

    - name: Test 3 - Update role (add privilege)
      ansible.builtin.uri:
        url: https://localhost:9200/_security/role/api-test-role
        method: PUT
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          cluster:
            - monitor
            - manage_own_api_key
            - read_ccr
          indices:
            - names:
                - test-index-*
              privileges:
                - read
                - write
        status_code: [200]
      register: role_update
      retries: 3
      delay: 5
      until: role_update.status | default(0) == 200

    - name: Verify role was updated (not re-created)
      ansible.builtin.assert:
        that:
          - not (role_update.json.role.created | default(false))
        success_msg: "Role update works on ES {{ es_info.json.version.number }}"

    - name: Verify role has new privilege
      ansible.builtin.uri:
        url: https://localhost:9200/_security/role/api-test-role
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        force_basic_auth: true
        validate_certs: false
      register: role_check
      retries: 3
      delay: 5
      until: role_check.status | default(0) == 200

    - name: Assert read_ccr in cluster privileges
      ansible.builtin.assert:
        that:
          - "'read_ccr' in role_check.json['api-test-role'].cluster"
        success_msg: "Role privileges updated correctly"

    - name: Test 4 - Delete user
      ansible.builtin.uri:
        url: https://localhost:9200/_security/user/api-test-user
        method: DELETE
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200]
      register: user_delete
      retries: 3
      delay: 5
      until: user_delete.status | default(0) == 200

    - name: Verify user deletion succeeded
      ansible.builtin.assert:
        that:
          - user_delete.json.found | default(false)
        success_msg: "User deletion works on ES {{ es_info.json.version.number }}"

    - name: Test 5 - Delete role
      ansible.builtin.uri:
        url: https://localhost:9200/_security/role/api-test-role
        method: DELETE
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200]
      register: role_delete
      retries: 3
      delay: 5
      until: role_delete.status | default(0) == 200

    - name: Verify role deletion succeeded
      ansible.builtin.assert:
        that:
          - role_delete.json.found | default(false)
        success_msg: "Role deletion works on ES {{ es_info.json.version.number }}"

    - name: Summary
      ansible.builtin.debug:
        msg: |
          ==========================================
          ES SECURITY API TESTS PASSED
          ==========================================
          Elasticsearch Version: {{ es_info.json.version.number }}

          All REST API operations tested:
            - Role CRUD (create, update, get, delete)
            - User CRUD (create, delete)
          ==========================================
