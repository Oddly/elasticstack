---
- name: Verify Elasticsearch with external certificates
  hosts: elasticsearch
  tasks:
    - name: Fetch Elastic password
      ansible.builtin.shell: |
        set -o pipefail
        grep "PASSWORD elastic " /usr/share/elasticsearch/initial_passwords |
        awk {' print $4 '}
      args:
        executable: /bin/bash
      register: elastic_pass
      changed_when: false
      run_once: true  # noqa: run-once[task]

    - name: Check cluster health
      ansible.builtin.uri:
        url: "https://localhost:9200/_cluster/health"
        method: GET
        force_basic_auth: true
        user: elastic
        password: "{{ elastic_pass.stdout }}"
        return_content: true
        status_code: 200
        validate_certs: false
      register: health
      run_once: true  # noqa: run-once[task]

    - name: Verify cluster is green or yellow
      ansible.builtin.assert:
        that:
          - health.json.status in ["green", "yellow"]
        fail_msg: "Cluster status is {{ health.json.status }}"
      run_once: true  # noqa: run-once[task]

    - name: Get HTTP certificate subject from Elasticsearch
      ansible.builtin.shell: |
        set -o pipefail
        echo | openssl s_client -connect localhost:9200 -servername localhost 2>/dev/null |
        openssl x509 -noout -subject
      args:
        executable: /bin/bash
      register: es_http_cert_subject
      changed_when: false

    - name: Verify HTTP cert is the external cert (not auto-generated)
      ansible.builtin.assert:
        that:
          - "'http' in es_http_cert_subject.stdout"
        fail_msg: >-
          Expected HTTP certificate subject to contain 'http' from our test cert.
          Got: {{ es_http_cert_subject.stdout }}

    - name: Verify transport cert file was deployed
      ansible.builtin.stat:
        path: "/etc/elasticsearch/certs/{{ inventory_hostname }}-transport.crt"
      register: transport_cert_stat

    - name: Assert transport cert exists
      ansible.builtin.assert:
        that:
          - transport_cert_stat.stat.exists
        fail_msg: "Transport certificate file not found"

    - name: Verify HTTP cert file was deployed
      ansible.builtin.stat:
        path: "/etc/elasticsearch/certs/{{ inventory_hostname }}-http.crt"
      register: http_cert_stat

    - name: Assert HTTP cert exists
      ansible.builtin.assert:
        that:
          - http_cert_stat.stat.exists
        fail_msg: "HTTP certificate file not found"

    - name: Verify CA cert was deployed
      ansible.builtin.stat:
        path: /etc/elasticsearch/certs/ca.crt
      register: ca_cert_stat

    - name: Assert CA cert exists
      ansible.builtin.assert:
        that:
          - ca_cert_stat.stat.exists
        fail_msg: "CA certificate file not found"

    - name: Read elasticsearch.yml
      ansible.builtin.slurp:
        src: /etc/elasticsearch/elasticsearch.yml
      register: es_yml_raw

    - name: Parse elasticsearch.yml content
      ansible.builtin.set_fact:
        _es_config: "{{ es_yml_raw.content | b64decode }}"

    - name: Verify PEM-style transport config
      ansible.builtin.assert:
        that:
          - "'xpack.security.transport.ssl.certificate' in _es_config"
          - "'xpack.security.transport.ssl.key' in _es_config"
        fail_msg: "Expected PEM-style transport SSL config in elasticsearch.yml"

    - name: Verify CA referenced in both transport and HTTP sections
      ansible.builtin.assert:
        that:
          - "'transport.ssl.certificate_authorities' in _es_config"
          - "'http.ssl.certificate_authorities' in _es_config"
        fail_msg: >-
          certificate_authorities missing from elasticsearch.yml — CA was
          configured but the template omitted it (first-install rendering bug).

    - name: Verify verification_mode is not 'none'
      ansible.builtin.assert:
        that:
          - "'verification_mode: none' not in _es_config"
        fail_msg: "SSL verification_mode is 'none' — certs provide no security"

    - name: Verify cert paths in config match files on disk
      ansible.builtin.stat:
        path: "/etc/elasticsearch/{{ item }}"
      register: _cert_path_check
      loop:
        - "certs/{{ inventory_hostname }}-transport.crt"
        - "certs/{{ inventory_hostname }}-transport.key"
        - "certs/{{ inventory_hostname }}-http.crt"
        - "certs/{{ inventory_hostname }}-http.key"
        - certs/ca.crt

    - name: Assert all referenced cert files exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "{{ item.item }} referenced in config but not on disk"
      loop: "{{ _cert_path_check.results }}"
      loop_control:
        label: "{{ item.item }}"
