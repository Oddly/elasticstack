---
prerun: false
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: default
platforms:
  - name: "cert-renew-es1-${MOLECULE_DISTRO:-debian12}-r${ELASTIC_RELEASE:-9}"
    groups:
      - elasticsearch
      - logstash
    distro: "${MOLECULE_DISTRO:-debian12}"
    memory_mb: 4096
  - name: "cert-renew-es2-${MOLECULE_DISTRO:-debian12}-r${ELASTIC_RELEASE:-9}"
    groups:
      - elasticsearch
      - kibana
    distro: "${MOLECULE_DISTRO:-debian12}"
    memory_mb: 5632
provisioner:
  name: ansible
  env:
    ANSIBLE_LOG_PATH: /var/log/ansible.log
  connection_options:
    ansible_connection: ssh
    ansible_user: root
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no
      -o "ProxyCommand=ssh -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10
      -i ${MOLECULE_SSH_KEY:-~/.ssh/molecule_id_ed25519}
      -W %h:%p root@${INCUS_HOST:-172.30.0.172}"
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /usr/bin/python3
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
