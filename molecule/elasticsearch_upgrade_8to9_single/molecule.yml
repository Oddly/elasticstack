---
prerun: false
# Molecule scenario for testing single-node Elasticsearch 8.x to 9.x upgrade
# Simpler test case than multi-node cluster upgrade
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: default
platforms:
  - name: "es-upgs-${MOLECULE_DISTRO:-debian12}${MOLECULE_RUN_SUFFIX}"
    groups:
      - elasticsearch
    distro: "${MOLECULE_DISTRO:-debian12}"
    memory_mb: 4096
provisioner:
  name: ansible
  env:
    ANSIBLE_LOG_PATH: /var/log/ansible.log
  connection_options:
    ansible_connection: ssh
    ansible_user: root
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /usr/bin/python3
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
