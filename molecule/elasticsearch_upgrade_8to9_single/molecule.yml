---
prerun: false
# Molecule scenario for testing single-node Elasticsearch 8.x to 9.x upgrade
# Simpler test case than multi-node cluster upgrade
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: default
platforms:
  - name: "es-upgs-${MOLECULE_DISTRO:-debian11}"
    groups:
      - elasticsearch
    distro: "${MOLECULE_DISTRO:-debian11}"
    memory_mb: 3328
provisioner:
  name: ansible
  env:
    ANSIBLE_LOG_PATH: /var/log/ansible.log
  connection_options:
    ansible_connection: ssh
    ansible_user: root
    ansible_ssh_retries: 3
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no
      -o "ProxyCommand=ssh -o StrictHostKeyChecking=no -o BatchMode=yes
      -i ${MOLECULE_SSH_KEY:-~/.ssh/molecule_id_ed25519}
      -W %h:%p root@${INCUS_HOST:-172.30.0.172}"
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /usr/bin/python3
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
