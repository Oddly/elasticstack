---
- name: Prepare
  hosts: all
  tasks:
    - name: Install packages for RHEL
      ansible.builtin.package:
        name:
          - iproute
          - NetworkManager
      when: ansible_facts.os_family == "RedHat"
      retries: 3
      delay: 10
      register: _rhel_install
      until: _rhel_install is success

    - name: Start NetworkManager
      ansible.builtin.service:
        name: NetworkManager
        state: started
        enabled: true
      when: ansible_facts.os_family == "RedHat"

    - name: Install packages for Debian
      ansible.builtin.apt:
        name:
          - gpg
          - gpg-agent
          - procps
          - curl
          - iproute2
        update_cache: true
      when: ansible_facts.os_family == "Debian"
      retries: 3
      delay: 10
      register: _apt_install
      until: _apt_install is success

    - name: Install common packages
      ansible.builtin.package:
        name:
          - git
          - openssl
          - unzip
          - systemd
      retries: 3
      delay: 10
      register: _common_install
      until: _common_install is success
