---
name: Collect diagnostic logs
description: >
  Collects diagnostics from molecule Incus containers on test failure:
  service logs, journal, systemctl status, ES cluster health, and
  runner system info.

inputs:
  artifact-name:
    description: Name for the uploaded artifact
    required: true

runs:
  using: composite
  steps:
    - name: Collect diagnostic logs
      shell: bash
      run: |
        diag="/tmp/molecule-diagnostics"
        mkdir -p "$diag"/service-logs

        INCUS_HOST="${INCUS_HOST:?INCUS_HOST secret must be set}"
        SSH_KEY="${MOLECULE_SSH_KEY:-~/.ssh/molecule_id_ed25519}"

        # Discover running Incus containers managed by molecule
        containers=$(ssh -o StrictHostKeyChecking=no -o BatchMode=yes \
          -i "$SSH_KEY" "root@${INCUS_HOST}" \
          "incus list --format csv -c n,s | grep ',RUNNING' | cut -d, -f1" 2>/dev/null || true)

        for name in $containers; do
          dir="$diag/service-logs/$name"
          mkdir -p "$dir"

          # Helper: run command inside Incus container via SSH
          run_in() {
            ssh -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=5 \
              -i "$SSH_KEY" "root@${INCUS_HOST}" \
              "incus exec $name -- bash -c '$1'" 2>/dev/null || true
          }

          # System journal (last 1000 lines)
          run_in 'journalctl --no-pager -n 1000 2>/dev/null' \
            > "$dir/journal.log" 2>&1 || true

          # Service status
          for svc in elasticsearch logstash kibana redis filebeat auditbeat metricbeat; do
            run_in "systemctl status $svc 2>/dev/null" \
              > "$dir/${svc}-status.txt" 2>&1 || true
          done

          # Elasticsearch logs
          run_in 'cat /var/log/elasticsearch/*.log 2>/dev/null' \
            > "$dir/elasticsearch.log" 2>&1 || true

          # Logstash logs
          run_in 'cat /var/log/logstash/logstash-plain.log /var/log/logstash/logstash-slowlog-plain.log 2>/dev/null' \
            > "$dir/logstash.log" 2>&1 || true

          # Kibana logs
          run_in 'cat /var/log/kibana/kibana.log 2>/dev/null' \
            > "$dir/kibana.log" 2>&1 || true

          # Filebeat logs
          run_in 'cat /var/log/filebeat/filebeat* 2>/dev/null' \
            > "$dir/filebeat.log" 2>&1 || true

          # Redis logs
          run_in 'cat /var/log/redis/*.log 2>/dev/null' \
            > "$dir/redis.log" 2>&1 || true

          # Elasticsearch cluster health
          run_in '
            pw=$(/usr/share/elasticsearch/bin/elasticsearch-keystore show bootstrap.password 2>/dev/null || true)
            if [ -n "$pw" ]; then
              curl -sk --max-time 5 -u "elastic:$pw" https://localhost:9200/_cluster/health?pretty 2>/dev/null
            else
              curl -sk --max-time 5 https://localhost:9200/_cluster/health?pretty 2>/dev/null
            fi
          ' > "$dir/es-cluster-health.json" 2>&1 || true

          run_in '
            pw=$(/usr/share/elasticsearch/bin/elasticsearch-keystore show bootstrap.password 2>/dev/null || true)
            if [ -n "$pw" ]; then
              curl -sk --max-time 5 -u "elastic:$pw" https://localhost:9200/_cat/indices?v 2>/dev/null
            else
              curl -sk --max-time 5 https://localhost:9200/_cat/indices?v 2>/dev/null
            fi
          ' > "$dir/es-indices.txt" 2>&1 || true

          # Disk and memory inside container
          {
            echo "=== Memory ===" ; run_in 'free -h'
            echo "=== Disk ===" ; run_in 'df -h'
          } > "$dir/container-resources.txt" 2>&1 || true
        done

        # Container memory report (cgroup v2 stats from Incus host)
        ssh -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=5 \
          -i "$SSH_KEY" "root@${INCUS_HOST}" bash -s << 'MEMSCRIPT' \
          > "$diag/container-memory-report.txt" 2>&1 || true
        printf "%-50s %10s %10s %10s %10s %10s\n" \
          "CONTAINER" "CURRENT" "PEAK" "ANON" "FILE" "LIMIT"
        echo "---"
        for c in $(incus list -f csv -c ns 2>/dev/null | grep ",RUNNING" | cut -d, -f1 | sort); do
          cgdir="/sys/fs/cgroup/lxc.payload.${c}"
          [ -f "$cgdir/memory.current" ] || continue
          current=$(($(cat "$cgdir/memory.current") / 1048576))
          peak=$(($(cat "$cgdir/memory.peak") / 1048576))
          anon=$(($(awk '/^anon /{print $2}' "$cgdir/memory.stat") / 1048576))
          file=$(($(awk '/^file /{print $2}' "$cgdir/memory.stat") / 1048576))
          limit=$(incus config get "$c" limits.memory 2>/dev/null)
          printf "%-50s %8dMB %8dMB %8dMB %8dMB %10s\n" \
            "$c" "$current" "$peak" "$anon" "$file" "$limit"
        done
        MEMSCRIPT

        # Runner system info
        {
          echo "=== Memory ===" ; free -h
          echo "=== Disk ===" ; df -h
          echo "=== Python ===" ; python3 --version ; pip3 list 2>/dev/null
          echo "=== Ansible ===" ; ansible --version 2>/dev/null
        } > "$diag/runner-info.txt" 2>&1 || true

        # Ansible log from molecule
        cp /var/log/ansible.log "$diag/ansible.log" 2>/dev/null || true

    - name: Upload diagnostics
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: /tmp/molecule-diagnostics/
        retention-days: 7
        if-no-files-found: ignore
