---
name: Test Linting
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
  workflow_call:
    inputs:
      rolename:
        required: true
        type: string
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  lint:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install test dependencies.
        run: uv pip install --system --break-system-packages --python /usr/bin/python3 -r requirements-test.txt
        env:
          SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt

      - name: Install Ansible collection dependencies.
        run: ansible-galaxy collection install http://${{ secrets.INCUS_HOST }}:8082/collections/community-general-12.3.0.tar.gz http://${{ secrets.INCUS_HOST }}:8082/collections/community-crypto-3.1.1.tar.gz http://${{ secrets.INCUS_HOST }}:8082/collections/ansible-posix-2.1.0.tar.gz

      - name: Lint code (yamllint).
        run: |
          yamllint .
        if: ${{ inputs.rolename == '' }}

      - name: Lint Role (yamllint).
        run: |
          yamllint "roles/${ROLENAME}"
        env:
          ROLENAME: ${{ inputs.rolename }}
        if: ${{ inputs.rolename != '' }}

      - name: Lint code (ansible-lint).
        run: |
          ansible-lint
        if: ${{ inputs.rolename == '' }}

      - name: Lint Role (ansible-lint).
        run: |
          ansible-lint "roles/${ROLENAME}"
        env:
          ROLENAME: ${{ inputs.rolename }}
        if: ${{ inputs.rolename != '' }}
