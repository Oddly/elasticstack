---
name: Test Elasticsearch custom certificates
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
  pull_request:
    types: [labeled]
    paths:
      - 'roles/elasticsearch/**'
      - 'roles/elasticstack/**'
      - 'molecule/elasticsearch_custom_certs*/**'
      - 'molecule/shared/**'
      - '.github/workflows/test_elasticsearch_custom_certs.yml'
      - '.github/workflows/molecule.yml'
  schedule:
    - cron: "30 2 * * 2,4,6"  # Tue/Thu/Sat — alternate with ES role

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && github.event.label.name != 'ci:run' && github.run_id || 'ci' }}
  cancel-in-progress: true

jobs:
  lint_elasticsearch:
    if: ${{ github.event_name != 'pull_request' || github.event.label.name == 'ci:run' }}
    uses: ./.github/workflows/test_linting.yml
    with:
      rolename: elasticsearch
    secrets: inherit

  molecule_elasticsearch_custom_certs:
    needs: lint_elasticsearch
    uses: ./.github/workflows/molecule.yml
    with:
      scenarios: '["elasticsearch_custom_certs","elasticsearch_custom_certs_minimal"]'
      distros: ${{ (github.event_name == 'pull_request' || github.event_name == 'merge_group') && '["rockylinux10","debian13"]' || '["rockylinux9","rockylinux10","ubuntu2204","ubuntu2404","ubuntu2604","debian12","debian13"]' }}
    secrets: inherit
