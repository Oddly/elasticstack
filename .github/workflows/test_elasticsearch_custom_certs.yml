---
name: Test Elasticsearch custom certificates
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
  pull_request:
    paths:
      - '.github/workflows/test_elasticsearch_custom_certs.yml'
      - 'molecule/elasticsearch_custom_certs/*'
      - 'roles/elasticstack/tasks/certs/cert_validate.yml'
      - 'roles/elasticstack/tasks/certs/cert_expiry_warn.yml'
      - 'roles/elasticsearch/tasks/elasticsearch-security.yml'
      - 'roles/elasticsearch/tasks/elasticsearch-keystore.yml'
      - 'roles/elasticsearch/templates/elasticsearch.yml.j2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_elasticsearch:
    uses: ./.github/workflows/test_linting.yml
    with:
      rolename: elasticsearch

  molecule_elasticsearch_custom_certs:
    needs: lint_elasticsearch
    runs-on: self-hosted
    timeout-minutes: 20

    env:
      COLLECTION_NAMESPACE: oddly
      COLLECTION_NAME: elasticstack

    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        distro:
          - debian12
        scenario:
          - elasticsearch_custom_certs
        release:
          - 9

    steps:
      - name: Check out code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install dependencies
        run: uv pip install --system --break-system-packages --python /usr/bin/python3 -r requirements-test.txt
        env:
          SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt

      - name: Set up collections path
        run: |
          echo "ANSIBLE_COLLECTIONS_PATH=$RUNNER_TEMP/collections" >> "$GITHUB_ENV"
          echo "MOLECULE_EPHEMERAL_DIRECTORY=$RUNNER_TEMP/molecule" >> "$GITHUB_ENV"

      - name: Install collection and dependencies
        run: |
          mkdir -p $ANSIBLE_COLLECTIONS_PATH/ansible_collections/$COLLECTION_NAMESPACE
          cp -a "$GITHUB_WORKSPACE" $ANSIBLE_COLLECTIONS_PATH/ansible_collections/$COLLECTION_NAMESPACE/$COLLECTION_NAME
          ansible-galaxy collection install http://172.30.0.172:8082/collections/community-general-12.3.0.tar.gz http://172.30.0.172:8082/collections/community-crypto-3.1.1.tar.gz http://172.30.0.172:8082/collections/ansible-posix-2.1.0.tar.gz

      - name: Set up SSH key for molecule
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MOLECULE_SSH_PRIVATE_KEY }}" > ~/.ssh/molecule_id_ed25519
          chmod 600 ~/.ssh/molecule_id_ed25519
          ssh-keyscan -t ed25519 ${{ secrets.INCUS_HOST || '172.30.0.172' }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Converge and verify
        run: |
          molecule converge -s ${{ matrix.scenario }}
          molecule verify -s ${{ matrix.scenario }}
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ELASTIC_RELEASE: ${{ matrix.release }}
          ELASTICSTACK_REPO_BASE_URL: http://elastic-cache.chiark.dev:8080
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_DIFF_ALWAYS: 'true'
          ANSIBLE_CALLBACKS_ENABLED: profile_tasks
          INCUS_HOST: ${{ secrets.INCUS_HOST }}
          MOLECULE_SSH_KEY: ~/.ssh/molecule_id_ed25519

      - name: Idempotence check
        timeout-minutes: 20
        run: molecule idempotence -s ${{ matrix.scenario }}
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ELASTIC_RELEASE: ${{ matrix.release }}
          ELASTICSTACK_REPO_BASE_URL: http://elastic-cache.chiark.dev:8080
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_DIFF_ALWAYS: 'true'
          ANSIBLE_CALLBACKS_ENABLED: profile_tasks
          INCUS_HOST: ${{ secrets.INCUS_HOST }}
          MOLECULE_SSH_KEY: ~/.ssh/molecule_id_ed25519

      - name: Collect and upload diagnostics
        if: failure()
        uses: ./.github/actions/collect-diagnostics
        with:
          artifact-name: diag-${{ matrix.scenario }}-${{ matrix.distro }}-r${{ matrix.release }}

      - name: Cleanup molecule
        if: always()
        run: molecule destroy -s ${{ matrix.scenario }}
        continue-on-error: true
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ELASTIC_RELEASE: ${{ matrix.release }}
          INCUS_HOST: ${{ secrets.INCUS_HOST }}
          MOLECULE_SSH_KEY: ~/.ssh/molecule_id_ed25519
