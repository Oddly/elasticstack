name: 'Agentry: Bug Fix'
on:
  issues:
    types: [labeled]
permissions:
  contents: write # needed for pr:create to push branches
  pull-requests: write
  issues: write
concurrency:
  group: agentry-bug-fix-${{ github.event.issue.number }}
  cancel-in-progress: true
jobs:
  agentry:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'bug'
    steps:
    - name: Checkout repository
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'
    - name: Install Claude Code
      run: npm install -g @anthropic-ai/claude-code
    - name: Prime Claude Code onboarding
      # Without this, claude -p tries to render the theme picker TUI and
      # aborts with "Raw mode is not supported" — see anthropics/claude-code#8938.
      run: |
        mkdir -p ~/.claude
        echo '{"hasCompletedOnboarding": true}' > ~/.claude.json
    - name: Install agentry
      run: pip install "agentry @ git+https://github.com/norrietaylor/agentry.git"
    - name: Diagnose and fix bug
      run: >
        agentry --output-format json run workflows/bug-fix.yaml
        --input repository-ref=.
        --binder github-actions
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
