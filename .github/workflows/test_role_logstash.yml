---
name: Test Role Logstash
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
  pull_request:
    types: [labeled]
    paths:
      - 'roles/logstash/**'
      - 'roles/elasticstack/**'
      - 'molecule/logstash_**'
      - 'molecule/shared/**'
      - '.github/workflows/test_role_logstash.yml'
      - '.github/workflows/molecule.yml'
  schedule:
    - cron: "0 5 * * 1,3,5"  # Mon/Wed/Fri — 72 jobs, alternate with full_stack

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && github.event.label.name != 'ci:run' && github.run_id || 'ci' }}
  cancel-in-progress: true

jobs:
  lint_logstash:
    if: ${{ github.event_name != 'pull_request' || github.event.label.name == 'ci:run' }}
    uses: ./.github/workflows/test_linting.yml
    with:
      rolename: logstash
    secrets: inherit

  molecule_logstash:
    needs: lint_logstash
    uses: ./.github/workflows/molecule.yml
    with:
      scenarios: '["logstash_default","logstash_ssl","logstash_custom_pipeline","logstash_advanced","logstash_standalone_certs","logstash_centralized_pipelines"]'
      distros: ${{ (github.event_name == 'pull_request' || github.event_name == 'merge_group') && '["rockylinux10","debian13"]' || '["rockylinux9","rockylinux10","ubuntu2204","ubuntu2404","ubuntu2604","debian12","debian13"]' }}
    secrets: inherit
