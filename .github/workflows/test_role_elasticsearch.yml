---
name: Test Role elasticsearch
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
  pull_request:
    paths:
      - 'roles/elasticsearch/**'
      - 'roles/elasticstack/**'
      - 'molecule/elasticsearch_**'
      - 'molecule/shared/**'
      - '.github/workflows/test_role_elasticsearch.yml'
      - '.github/workflows/molecule.yml'
  schedule:
    - cron: "0 2 * * 1,3,5"  # Mon/Wed/Fri — 60 jobs, stagger with full_stack

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_elasticsearch:
    uses: ./.github/workflows/test_linting.yml
    with:
      rolename: elasticsearch
    secrets: inherit

  molecule_elasticsearch:
    needs: lint_elasticsearch
    uses: ./.github/workflows/molecule.yml
    with:
      scenarios: '["elasticsearch_default","elasticsearch_roles_calculation","elasticsearch_custom","elasticsearch_no-security","elasticsearch_cert_content"]'
      distros: ${{ (github.event_name == 'pull_request' || github.event_name == 'merge_group') && '["rockylinux10","debian13"]' || '["rockylinux9","rockylinux10","ubuntu2204","ubuntu2404","debian12","debian13"]' }}
    secrets: inherit

  molecule_elasticsearch_diagnostics:
    needs: lint_elasticsearch
    uses: ./.github/workflows/molecule.yml
    with:
      scenarios: '["elasticsearch_diagnostics"]'
      distros: '["debian13"]'
      releases: '["9"]'
      timeout: 30
      skip-idempotence: true
    secrets: inherit
