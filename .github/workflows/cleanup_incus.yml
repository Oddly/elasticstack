---
name: Cleanup stale Incus containers
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Set up SSH key
        run: |
          echo "${{ secrets.MOLECULE_SSH_PRIVATE_KEY }}" > ${{ runner.temp }}/molecule_id_ed25519
          chmod 600 ${{ runner.temp }}/molecule_id_ed25519
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 ${{ secrets.INCUS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run smart cleanup (checks Gitea API for orphaned containers)
        run: |
          SSH="ssh -o StrictHostKeyChecking=no -o BatchMode=yes -i ${{ runner.temp }}/molecule_id_ed25519 root@${INCUS_HOST}"
          $SSH /usr/local/bin/cleanup-molecule-containers.sh
        env:
          INCUS_HOST: ${{ secrets.INCUS_HOST }}

      - name: Clean up SSH key
        if: always()
        run: rm -f ${{ runner.temp }}/molecule_id_ed25519
