---
name: Cleanup stale Incus containers
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MOLECULE_SSH_PRIVATE_KEY }}" > ~/.ssh/molecule_id_ed25519
          chmod 600 ~/.ssh/molecule_id_ed25519
          ssh-keyscan -t ed25519 ${{ secrets.INCUS_HOST || '172.30.0.172' }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run smart cleanup (checks Gitea API for orphaned containers)
        run: |
          SSH="ssh -o StrictHostKeyChecking=no -o BatchMode=yes -i ~/.ssh/molecule_id_ed25519 root@${INCUS_HOST:-172.30.0.172}"
          $SSH /usr/local/bin/cleanup-molecule-containers.sh
        env:
          INCUS_HOST: ${{ secrets.INCUS_HOST }}
