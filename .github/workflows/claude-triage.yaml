name: 'Claude: Triage'

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to (re-)triage'
        required: true
        type: string

permissions:
  contents: read
  issues: write
  id-token: write  # Required by anthropics/claude-code-action for OIDC auth

concurrency:
  group: claude-triage-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: true

jobs:
  triage:
    # Only Oddly (the maintainer) can cause this workflow to do any work —
    # issue opens by anyone else, or workflow_dispatch invocations by any
    # other collaborator, get gated out. Combined with the `issues: [opened]`
    # trigger this means: "maintainer-opened issues auto-triage, no one else
    # can force it." Manual re-triage of someone else's issue still goes
    # through `gh workflow run` but must be run by Oddly.
    if: github.actor == 'Oddly'
    # Self-hosted runners live on incus-ci LXC 305 inside the lab's
    # 172.30.0.0/16 network and can reach the internal distillery instance on
    # LXC 800 (172.30.0.62:8000). github.com-hosted runners cannot.
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 1

      - name: Load triage prompt
        id: prompt
        run: |
          {
            echo 'body<<CLAUDE_TRIAGE_PROMPT_EOF'
            cat .github/prompts/triage-distillery.md
            echo
            echo "Issue to triage: #${{ github.event.issue.number || inputs.issue_number }}"
            echo CLAUDE_TRIAGE_PROMPT_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Write distillery MCP config
        run: |
          cat > "${RUNNER_TEMP}/distillery-mcp.json" <<'EOF'
          {
            "mcpServers": {
              "distillery": {
                "type": "http",
                "url": "http://172.30.0.62:8000/mcp"
              }
            }
          }
          EOF

      - name: Run Claude
        uses: anthropics/claude-code-action@b47fd721da662d48c5680e154ad16a73ed74d2e0 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.body }}
          claude_args: --mcp-config ${{ runner.temp }}/distillery-mcp.json --allowedTools "Read,Grep,Glob,Bash(git:*),Bash(gh issue:*),Bash(gh search:*),Bash(gh api repos/Oddly/elasticstack/contents/*),mcp__distillery__distillery_search"
