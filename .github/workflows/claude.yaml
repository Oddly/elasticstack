name: 'Claude Code'

# Mention-gated interactive workflow: @claude in an issue body, an issue
# comment, a PR review comment, or a PR review fires Claude in free-form
# mode. Pattern ported from norrietaylor/distillery .github/workflows/claude.yml
# — kept deliberately close to the upstream shape so we get the benefit of
# whatever Norrie tunes there over time.
#
# Paired with `claude-triage.yaml` which auto-triages issues the maintainer
# opens, without requiring an explicit @claude mention. See that workflow's
# `if:` gate for the author check.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Suppress duplicate runs when @claude is mentioned multiple times in rapid
# succession on the same issue/PR/comment thread. Cancels in-flight runs so
# only the most recent invocation completes — keeps token spend bounded if
# you accidentally double-ping.
concurrency:
  group: claude-code-${{ github.event.issue.number || github.event.pull_request.number || github.event.comment.id || github.run_id }}
  cancel-in-progress: true

jobs:
  claude:
    # Only Oddly can invoke Claude. The @claude mention is still required —
    # someone (only Oddly) has to explicitly ask — but on top of that the
    # actor check means anyone else dropping @claude in a comment, issue, or
    # review gets silently ignored. No LLM spend from drive-by mentions.
    if: |
      github.actor == 'Oddly' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    # Self-hosted runners (incus-ci LXC 305) so @claude has access to the
    # internal lab network — gitea, distillery (LXC 800), and any other
    # 172.30.0.0/16 service. Distillery isn't auto-registered here because
    # the interactive workflow doesn't load a triage prompt; if you want
    # KB access in a free-form @claude session, mention it explicitly.
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read
      issues: read
      actions: read # Required for Claude to read CI results on PRs
      id-token: write # Required by anthropics/claude-code-action for OIDC auth
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@b47fd721da662d48c5680e154ad16a73ed74d2e0 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
