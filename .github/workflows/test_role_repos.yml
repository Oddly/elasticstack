---
name: Test Role repos
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
  pull_request:
    paths:
      - 'roles/repos/**'
      - 'roles/elasticstack/**'
      - 'molecule/repos_**'
      - 'molecule/shared/**'
      - '.github/workflows/test_role_repos.yml'
      - '.github/workflows/molecule.yml'
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_repos:
    uses: ./.github/workflows/test_linting.yml
    with:
      rolename: repos
    secrets: inherit

  molecule_repos:
    needs: lint_repos
    uses: ./.github/workflows/molecule.yml
    with:
      scenarios: '["repos_default"]'
      distros: ${{ (github.event_name == 'pull_request' || github.event_name == 'merge_group') && '["rockylinux10","debian13"]' || '["rockylinux9","rockylinux10","ubuntu2204","ubuntu2404","debian12","debian13"]' }}
      timeout: 30
    secrets: inherit
