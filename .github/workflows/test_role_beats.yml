---
name: Test Role beats
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
  pull_request:
    types: [labeled]
    paths:
      - 'roles/beats/**'
      - 'roles/elasticstack/**'
      - 'molecule/beats_**'
      - 'molecule/shared/**'
      - '.github/workflows/test_role_beats.yml'
      - '.github/workflows/molecule.yml'
  schedule:
    - cron: "30 5 * * 2,4,6"  # Tue/Thu/Sat — 48 jobs, alternate with logstash

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && github.event.label.name != 'ci:run' && github.run_id || 'ci' }}
  cancel-in-progress: true

jobs:
  lint_beats:
    if: ${{ github.event_name != 'pull_request' || github.event.label.name == 'ci:run' }}
    uses: ./.github/workflows/test_linting.yml
    with:
      rolename: beats
    secrets: inherit

  molecule_beats:
    needs: lint_beats
    uses: ./.github/workflows/molecule.yml
    with:
      scenarios: '["beats_default","beats_peculiar","beats_advanced","beats_security"]'
      distros: ${{ (github.event_name == 'pull_request' || github.event_name == 'merge_group') && '["rockylinux10","debian13"]' || '["rockylinux9","rockylinux10","ubuntu2204","ubuntu2404","ubuntu2604","debian12","debian13"]' }}
    secrets: inherit
