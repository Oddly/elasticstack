identity:
  name: feature-implement
  version: 1.0.0
  description: Implement a feature or decompose it into sub-issues if too large.

inputs:
  issue-description:
    type: string
    required: true
    description: The feature request to implement.
    source: issue.body
    fallback: issue.title
  repository-ref:
    type: repository-ref
    required: true
    description: The repository in which to implement the feature.

tools:
  capabilities:
    - repository:read
    - shell:execute
    - pr:create
    - issue:comment
    - issue:label
    - issue:create

agent:
  runtime: claude-code
  model: claude-sonnet-4-20250514
  system_prompt: prompts/feature-implement.md
  max_iterations: 10

safety:
  trust: elevated
  resources:
    timeout: 600

output:
  schema:
    type: object
    required: [action, reasoning]
    properties:
      action:
        type: string
        enum: [implemented, decomposed]
      pr_url:
        type: string
      sub_issues:
        type: array
        items:
          type: string
      reasoning:
        type: string
  side_effects:
    - type: terminal
      description: Print implementation or decomposition summary to stdout
  output_paths:
    - feature-implement-result.json

composition:
  steps: []
