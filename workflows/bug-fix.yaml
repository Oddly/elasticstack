identity:
  name: bug-fix
  version: 1.0.0
  description: Diagnose a bug, implement a fix with molecule test coverage, and open a PR.

inputs:
  issue-description:
    type: string
    required: true
    description: The bug report to diagnose.
    source: issue.body
    fallback: issue.title
  repository-ref:
    type: repository-ref
    required: true
    description: The repository to fix.

tools:
  capabilities:
    - repository:read
    - shell:execute
    - pr:create
    - issue:comment

agent:
  runtime: claude-code
  model: claude-sonnet-4-20250514
  system_prompt: prompts/bug-fix.md
  max_iterations: 20

safety:
  trust: elevated
  resources:
    timeout: 300

output:
  schema:
    type: object
    required: [diagnosis, root_cause, suggested_fix, confidence]
    properties:
      diagnosis:
        type: string
      root_cause:
        type: string
      suggested_fix:
        type: object
        required: [file, line, change]
        properties:
          file:
            type: string
          line:
            type: integer
          change:
            type: string
      confidence:
        type: number
        minimum: 0.0
        maximum: 1.0
  side_effects:
    - type: terminal
      description: Print diagnosis summary to stdout
  output_paths:
    - bug-fix-result.json
  budget:
    max_findings: 1

composition:
  steps: []
