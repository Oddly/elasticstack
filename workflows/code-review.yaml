identity:
  name: code-review
  version: 1.0.0
  description: >
    Review pull request diffs for Ansible best practices, security issues,
    idempotency problems, and test coverage gaps in the elasticstack collection.

inputs:
  diff:
    type: git-diff
    required: true
    ref: HEAD~1
    description: The git diff to review.
  codebase:
    type: repository-ref
    required: true
    description: The repository to review.

tools:
  capabilities:
    - repository:read

agent:
  runtime: claude-code
  model: claude-sonnet-4-20250514
  system_prompt: prompts/code-review.md
  max_iterations: 20

safety:
  trust: elevated
  resources:
    timeout: 300

output:
  schema:
    type: object
    properties:
      findings:
        type: array
        items:
          type: object
          properties:
            file:
              type: string
            line:
              type: integer
            severity:
              type: string
              enum: [critical, warning, info]
            category:
              type: string
              enum: [security, performance, style, correctness]
            description:
              type: string
            suggestion:
              type: string
          required: [file, line, severity, category, description]
      summary:
        type: string
      confidence:
        type: number
        minimum: 0
        maximum: 1
    required: [findings, summary, confidence]
  side_effects: []
  output_paths:
    - review.json
  budget:
    max_findings: 10
