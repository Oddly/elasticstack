identity:
  name: task-decompose
  version: 1.0.0
  description: Break a triaged issue into implementation tasks with role boundaries and test strategy.

inputs:
  triage_result:
    type: string
    required: true
    description: Triage result JSON with severity, category, affected roles, and reasoning.
  repository-ref:
    type: repository-ref
    required: true
    description: The repository to inspect for role structure and test scenarios.

tools:
  capabilities:
    - repository:read

agent:
  runtime: claude-code
  model: claude-sonnet-4-20250514
  system_prompt: prompts/task-decompose.md
  max_iterations: 10

safety:
  trust: elevated
  resources:
    timeout: 180

output:
  schema:
    type: object
    required: [tasks]
    properties:
      tasks:
        type: array
        items:
          type: object
          required: [title, description, priority, estimated_effort]
          properties:
            title:
              type: string
            description:
              type: string
            priority:
              type: string
              enum: [critical, high, medium, low]
            estimated_effort:
              type: string
              enum: [small, medium, large, xl]
  side_effects:
    - type: terminal
      description: Print task decomposition to stdout
  output_paths:
    - task-decompose-result.json

composition:
  steps: []
