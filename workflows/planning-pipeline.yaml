identity:
  name: planning-pipeline
  version: 1.0.0
  description: Full issue planning — triage, decompose into tasks, post summary.

inputs:
  issue-description:
    type: string
    required: true
    description: The issue to plan.
    source: issue.body
    fallback: issue.title
  repository-ref:
    type: repository-ref
    required: true
    description: The repository to inspect.

tools:
  capabilities:
    - issue:comment
    - issue:label

agent:
  runtime: claude-code
  model: claude-sonnet-4-20250514

safety:
  trust: elevated
  resources:
    timeout: 600

output:
  schema:
    type: object
    description: Composed planning result with triage and task decomposition.
  output_paths:
    - planning-result.json

composition:
  steps:
    - name: triage
      workflow: triage.yaml
      depends_on: []
      inputs: {}
    - name: task-decompose
      workflow: task-decompose.yaml
      depends_on:
        - triage
      inputs:
        triage_result: triage.output
