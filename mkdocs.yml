site_name: oddly.elasticstack
site_description: Deploy and manage the Elastic Stack with Ansible
site_url: https://oddly.github.io/elasticstack/
repo_url: https://github.com/Oddly/elasticstack
repo_name: Oddly/elasticstack
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/elastic-logo.svg
  favicon: assets/elastic-logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.footer
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest
    - toc.follow
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oddly/elasticstack
      name: elasticstack on GitHub

extra_css:
  - stylesheets/custom.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      baselevel: 1
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

exclude_docs: |
  wiki/

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide:
      - Architecture: architecture.md
      - TLS & Certificates: tls.md
      - Recipes: recipes.md
  - Roles:
      - roles/index.md
      - Shared Defaults: roles/elasticstack.md
      - Repository Setup: roles/repos.md
      - Elasticsearch: roles/elasticsearch.md
      - Kibana: roles/kibana.md
      - Logstash: roles/logstash.md
      - Beats: roles/beats.md
